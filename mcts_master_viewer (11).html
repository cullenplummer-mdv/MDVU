/* ═══════════════════════════════════════════
   MASTER SHELL — overrides module shells
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#1a2535;display:flex;flex-direction:column;height:100vh;overflow:hidden;color:#0f1c2e}

/* Top nav bar with module jump buttons */
#topbar{height:48px;background:#060f1e;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;overflow:hidden}
#topbar-brand{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);white-space:nowrap;padding-right:16px;border-right:1px solid rgba(255,255,255,.1);margin-right:12px;flex-shrink:0}
#module-nav{display:flex;gap:4px;align-items:center;flex:1;overflow:hidden}
.mod-btn{background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.45);padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;letter-spacing:.04em;flex-shrink:0}
.mod-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.2)}
.mod-btn.active{background:rgba(0,119,182,.25);border-color:#0077b6;color:#90e0ef}
#topbar-count{font-size:11px;color:rgba(255,255,255,.35);font-weight:500;white-space:nowrap;flex-shrink:0;margin-left:12px;padding-left:12px;border-left:1px solid rgba(255,255,255,.1)}

/* Progress bar */
#progress-track{height:2px;background:rgba(255,255,255,.08);flex-shrink:0}
#progress-fill{height:100%;background:linear-gradient(90deg,#0077b6,#00b4d8);width:0%;transition:width .3s ease}

/* Stage */
#stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0}

/* Bottom nav */
#bottombar{height:52px;background:#060f1e;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;padding:0 16px}
.nav-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:white;padding:7px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:.02em}
.nav-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
.nav-btn:disabled{opacity:.25;cursor:default}
.slide-counter{font-size:12px;color:rgba(255,255,255,.35);font-weight:500;min-width:80px;text-align:center}

/* Slide wrappers */
.swrap{display:none;position:absolute;inset:0;align-items:center;justify-content:center}
.swrap.active{display:flex}
.sscale{transform-origin:center center}
@keyframes fadeIn{from{opacity:0;transform:scale(.985)}to{opacity:1;transform:scale(1)}}
.swrap.active .sscale{animation:fadeIn .16s ease-out}

/* Slide base — canonical fixed version */
.slide{width:1280px;height:720px;background:#fff;position:relative;overflow:hidden;display:flex;border-radius:6px;box-shadow:0 20px 80px rgba(0,0,0,.55);flex-shrink:0}
.slide > div{min-height:0}
.sscale .slide{overflow:hidden !important}

// ─── STATE ───
let current = 0;
const total = SLIDES.length;

// ─── BUILD STAGE ───
const stage = document.getElementById('stage');
SLIDES.forEach((html, i) => {
  const wrap = document.createElement('div');
  wrap.className = 'swrap';
  wrap.id = 'sw' + i;
  const scaler = document.createElement('div');
  scaler.className = 'sscale';
  scaler.innerHTML = html;
  wrap.appendChild(scaler);
  stage.appendChild(wrap);
});

// ─── SCALING ───
function rescale() {
  const sw = stage.offsetWidth;
  const sh = stage.offsetHeight;
  const scale = Math.min(sw / 1280, sh / 720) * 0.96;
  document.querySelectorAll('.sscale').forEach(el => {
    el.style.transform = `scale(${scale})`;
  });
}
window.addEventListener('resize', rescale);
rescale();

// ─── MODULE UTILS ───
function getModuleForSlide(idx) {
  for (let i = MODULES.length - 1; i >= 0; i--) {
    if (idx >= MODULES[i].startIdx) return i;
  }
  return 0;
}

function updateModuleButtons(slideIdx) {
  const activeModIdx = getModuleForSlide(slideIdx);
  document.querySelectorAll('.mod-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === activeModIdx);
  });
}

// ─── NAVIGATION ───
function goTo(idx) {
  if (idx < 0 || idx >= total) return;
  document.getElementById('sw' + current)?.classList.remove('active');
  current = idx;
  document.getElementById('sw' + current).classList.add('active');

  // Progress
  document.getElementById('progress-fill').style.width = ((current + 1) / total * 100) + '%';

  // Counters
  document.getElementById('topbar-count').textContent = (current + 1) + ' / ' + total;
  
  // Module-aware slide counter
  const modIdx = getModuleForSlide(current);
  const mod = MODULES[modIdx];
  const slideInMod = current - mod.startIdx + 1;
  document.getElementById('slide-counter').textContent = mod.id + ' · ' + slideInMod + ' / ' + mod.count;

  // Buttons
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;

  // Module nav highlight
  updateModuleButtons(current);
}

function navigate(dir) { goTo(current + dir); }

function jumpToModule(modIdx) {
  goTo(MODULES[modIdx].startIdx);
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
});

// ─── INIT ───
goTo(0);
</script>
