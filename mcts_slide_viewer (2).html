 VUE-QR ═══════════════════════════════ -->"}, {"id": "m3-slide-5", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 5, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-5\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">No-Wire Access<\/div>\n    <h2>VUE-QR: <em>Smart Access, No Wires<\/em><\/h2>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">🪧<\/div>\n      <div>\n        <strong>Device Type<\/strong>\n        <p>A placard or sticker — not electronic hardware. Zero components to power or wire.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">🔌<\/div>\n      <div>\n        <strong>Zero Infrastructure<\/strong>\n        <p>Requires no wiring, power, or internet connection at the mounting point.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">📱<\/div>\n      <div>\n        <strong>How It Works<\/strong>\n        <p>Visitors scan the QR code to trigger a cloud-based access event via an integrated partner system or cellular relay.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">🌐<\/div>\n      <div>\n        <strong>Web-Based Interface<\/strong>\n        <p>Visitors scan to enter — no app download required. Utilizes smartphone GPS for mandatory geo-fencing.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">💡<\/span>\n      <div><strong>Pro-Tip:<\/strong> Ideal for secondary gates, remote access points (pools/gyms), or budget-conscious projects.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"img-placeholder\" style=\"width:100%; height:100%;\">\n      <div class=\"ph-icon\">📷<\/div>\n      <div class=\"ph-label\">VUE-QR Product Photo<\/div>\n      <div class=\"ph-sub\">Contactless Access Placard<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 03 · Hardware &amp; Installation<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 6 — USE CASES ═══════════════════════════════ -->"}, {"id": "m3-slide-6", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 6, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-6\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Hardware Selection Guide<\/div>\n      <h2>MyDoorView Hardware: <em>Strategic Use Cases<\/em><\/h2>\n    <\/div>\n    <div class=\"use-cases-grid\">\n      <div class=\"use-case-card card-base\">\n        <div class=\"uc-icon\">🏢<\/div>\n        <div class=\"uc-tag\">Flagship Performance<\/div>\n        <h3>VUE-7R<\/h3>\n        <ul>\n          <li><strong>Best For:<\/strong> Main building entrances, multi-tenant lobbies, and pedestrian or vehicle gates.<\/li>\n          <li><strong>Key Features:<\/strong> Large 7-inch touchscreen for easy directory navigation and 2MP HD camera for guest verification.<\/li>\n          <li><strong>Advanced Control:<\/strong> Supports elevator integration for up to 64 floors.<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"use-case-card card-base\">\n        <div class=\"uc-icon\">🚪<\/div>\n        <div class=\"uc-tag\">The Mullion Intercom<\/div>\n        <h3>VUE 5-ER<\/h3>\n        <ul>\n          <li><strong>Best For:<\/strong> Commercial storefronts, narrow door frames, and interior office retrofits.<\/li>\n          <li><strong>Slim Design:<\/strong> Only 2.13 inches wide — space-efficient without sacrificing HD video.<\/li>\n          <li><strong>Versatile Access:<\/strong> Full compatibility with NFC, Prox, and Bluetooth credentials.<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"use-case-card card-base\">\n        <div class=\"uc-icon\">📲<\/div>\n        <div class=\"uc-tag\">Smart Access, No Wires<\/div>\n        <h3>VUE-QR<\/h3>\n        <ul>\n          <li><strong>Best For:<\/strong> Secondary gates, remote access points (pools/gyms), and budget-conscious projects.<\/li>\n          <li><strong>Zero Infrastructure:<\/strong> A non-electronic placard requiring no wiring, power, or internet.<\/li>\n          <li><strong>Secure Entry:<\/strong> Smartphone GPS geo-fencing and web-based guest entry.<\/li>\n        <\/ul>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 03 · Hardware &amp; Installation<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 7 — ENVIRONMENTAL ═══════════════════════════════ -->"}, {"id": "m3-slide-7", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 7, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-7\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Installation Requirements<\/div>\n      <h2 class=\"slide-title\">Environmental <em>Mandates<\/em><\/h2>\n    <\/div>\n    <div class=\"env-grid\">\n      <div class=\"env-card\">\n        <div class=\"env-icon-wrap\">🛡️<\/div>\n        <div class=\"env-card-body\">\n          <strong>IP65 Weather Rating<\/strong>\n          <p>You <strong>must<\/strong> purchase and use the official MyDoorView backbox to obtain the IP65 weather resistance rating. The backbox is not optional — it is a warranty requirement.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"env-card\">\n        <div class=\"env-icon-wrap\">🔩<\/div>\n        <div class=\"env-card-body\">\n          <strong>Supported Mount Types<\/strong>\n          <p>Three certified mounting configurations are supported: <strong>Flush Mount<\/strong>, <strong>Surface Mount<\/strong>, and <strong>Surface Mount with Hood<\/strong>. Use only approved mounts to maintain warranty.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"env-card\">\n        <div class=\"env-icon-wrap\">🌡️<\/div>\n        <div class=\"env-card-body\">\n          <strong>Operating Temperature Range<\/strong>\n          <p>The VUE Series is rated for <strong>−40°F to 140°F<\/strong>. Installations in extreme climates should include appropriate shading or ventilation to stay within this range.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"env-card\">\n        <div class=\"env-icon-wrap\">🧹<\/div>\n        <div class=\"env-card-body\">\n          <strong>Screen &amp; Maintenance<\/strong>\n          <p>Clean the touch display with a <strong>soft cloth only<\/strong>. Never use chemicals, irrigation spray, or pressure washers — these permanently damage the screen coating and void the warranty.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div class=\"env-warning\">\n      <span class=\"env-warn-icon\">☀️<\/span>\n      <div><strong>Sunlight Warning:<\/strong> Avoid direct South-facing installs. Overheating causes screen de-lamination which is classified as <strong>environmental damage — not covered by warranty<\/strong>. Use a hood or shading solution where needed.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 03 · Hardware &amp; Installation<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 8 — POWER ═══════════════════════════════ -->"}, {"id": "m3-slide-8", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 8, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-8\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Critical Mandates<\/div>\n      <h2 class=\"slide-title\">Power Requirements &amp; <em>Safety Rules<\/em><\/h2>\n    <\/div>\n    <div class=\"power-layout\">\n      <div class=\"power-card card-base\">\n        <h3>⚡ Power Sources<\/h3>\n        <ul>\n          <li><strong>PoE+ (D Port):<\/strong> Must use a PoE+ type power supply for network-powered installations.<\/li>\n          <li><strong>12V DC (C Port):<\/strong> Recommended for wire runs exceeding standard PoE distance limits.<\/li>\n          <li><strong>Minimum Amperage:<\/strong> 12V DC installations require a minimum <strong>3-amp<\/strong> power supply.<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"power-card card-base\">\n        <h3>📏 Wiring Standards<\/h3>\n        <ul>\n          <li><strong>Minimum Gauge:<\/strong> All wiring must be at least <strong>16 AWG<\/strong>.<\/li>\n          <li><strong>Lock Power Upgrade (A1 Port):<\/strong> If powering an external lock from A1, upgrade the power supply to a minimum of <strong>5 amps<\/strong>.<\/li>\n          <li><strong>Max Runs:<\/strong> Cat5 PoE+ max 40ft · Cat6 PoE+ max 200ft.<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"poe-warning\">\n        <span class=\"w-icon\">⚠️<\/span>\n        <div><strong>The PoE Safety Rule:<\/strong> Lock power <strong>shall not be used<\/strong> when the panel is powered via PoE. If powering an external lock, switch to 12V DC and upgrade to a 5-amp supply.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 03 · Hardware &amp; Installation<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 9 — WIRE DISTANCE ═══════════════════════════════ -->"}, {"id": "m3-slide-9", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 9, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-9\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">Connectivity Limits<\/div>\n    <h2>Wire Distance <em>&amp; Stability<\/em><\/h2>\n    <p style=\"font-size:14px; color:#475569; font-style:italic;\">Avoiding Voltage Drop &amp; Connectivity Limits<\/p>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">🔌<\/div>\n      <div>\n        <strong>Plug-and-Play Connectivity<\/strong>\n        <p>The D Port (Ethernet) connects directly to the cloud. <strong>No port forwarding<\/strong> required for standard operation.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">☁️<\/div>\n      <div>\n        <strong>Cloud Direct<\/strong>\n        <p>No complex network configuration needed on-site. Connects directly without additional setup.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">💡<\/span>\n      <div><strong>Rule of thumb:<\/strong> Runs over 40ft → use Cat6. Runs beyond 200ft → switch to 12V DC with 16 AWG minimum.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"distance-chart\">\n      <div class=\"dist-row\">\n        <div class=\"dist-row-label\">\n          <span>Cat5 · PoE+<\/span>\n          <span class=\"dist-val\">40 ft max<\/span>\n        <\/div>\n        <div class=\"dist-bar-track\">\n          <div class=\"dist-bar-fill\" style=\"width:20%;\"><\/div>\n        <\/div>\n        <div class=\"dist-label\">⚠️ Not recommended beyond 40 linear feet<\/div>\n      <\/div>\n      <div class=\"dist-row\">\n        <div class=\"dist-row-label\">\n          <span>Cat6 · PoE+<\/span>\n          <span class=\"dist-val\">200 ft max<\/span>\n        <\/div>\n        <div class=\"dist-bar-track\">\n          <div class=\"dist-bar-fill\" style=\"width:100%;\"><\/div>\n        <\/div>\n        <div class=\"dist-label\">✅ Preferred for longer runs up to 200 linear feet<\/div>\n      <\/div>\n      <div class=\"dist-row\">\n        <div class=\"dist-row-label\">\n          <span>12V DC · Extended Runs<\/span>\n          <span class=\"dist-val\">200 ft+<\/span>\n        <\/div>\n        <div class=\"dist-bar-track\">\n          <div class=\"dist-bar-fill\" style=\"width:100%; background: linear-gradient(90deg, #005f92, #27ae60);\"><\/div>\n        <\/div>\n        <div class=\"dist-label\">✅ Best for long runs — 16 AWG wire minimum<\/div>\n      <\/div>\n      <div class=\"dist-quick-ref\">\n        <div class=\"qr-title\">Quick Reference<\/div>\n        <div class=\"qr-stats\">\n          <div><div class=\"qr-stat-val\">40 ft<\/div><div class=\"qr-stat-label\">Cat5 Limit<\/div><\/div>\n          <div><div class=\"qr-stat-val\">200 ft<\/div><div class=\"qr-stat-label\">Cat6 Limit<\/div><\/div>\n          <div><div class=\"qr-stat-val\">16 AWG<\/div><div class=\"qr-stat-label\">Min Wire Gauge<\/div><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 03 · Hardware &amp; Installation<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 10 — REAR I/O & RELAY WIRING ═══════════════════════════════ -->"}, {"id": "m3-slide-10", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 10, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-10\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">Wiring Reference<\/div>\n    <h2>Rear I/O &amp; <em>Relay Wiring<\/em><\/h2>\n    <div class=\"port-rows\">\n      <div class=\"port-row\">\n        <div class=\"port-badge\">A<br>Ports<\/div>\n        <div class=\"port-row-text\">\n          <strong>Data &amp; Low Power<\/strong>\n          <p>A1: Optional 12V DC Out (low current) · A3: REX input for Relay 1 · A6–A10: Wiegand 1 &amp; 2 (D0/D1) communication terminals<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"port-row\">\n        <div class=\"port-badge\">B<br>Ports<\/div>\n        <div class=\"port-row-text\">\n          <strong>Relays<\/strong>\n          <p>Duration: 1–99 sec (set in portal) · Supports NO and NC configurations · <strong>Always wire Relay 2 as a local backup<\/strong> for failover<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"port-row\">\n        <div class=\"port-badge\">C<br>Ports<\/div>\n        <div class=\"port-row-text\">\n          <strong>Power Input<\/strong>\n          <p>C1/C2: Main terminals for +12V IN and Ground · Min 3A supply · Upgrade to 5A if powering locks via A1<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"port-row\">\n        <div class=\"port-badge\">D<br>Port<\/div>\n        <div class=\"port-row-text\">\n          <strong>Internet / PoE+<\/strong>\n          <p>Plug-and-play Ethernet — no port forwarding needed · Direct cloud connection for standard operation<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"port-row\" style=\"background:#fff8e1; border-color:#fbbf24;\">\n        <div class=\"port-badge\" style=\"background: linear-gradient(135deg,#d97706,#fbbf24);\">E<br>Port<\/div>\n        <div class=\"port-row-text\">\n          <strong>⚠️ Not Used — Leave Empty<\/strong>\n          <p>The E Port has no function. Do not connect anything to this port.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\" style=\"margin-top:4px;\">\n      <span class=\"tip-icon\">💡<\/span>\n      <div><strong>Fail-over Strategy:<\/strong> Cloud systems (Brivo/PDK) trigger the door via API. Wiring Relay 2 directly to the lock ensures residents can still enter if the internet is lost.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"img-placeholder\" style=\"width:100%; height:100%;\">\n      <div class=\"ph-icon\">📷<\/div>\n      <div class=\"ph-label\">Rear I/O Wiring Diagram<\/div>\n      <div class=\"ph-sub\">Port Layout &amp; Connection Reference<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 03 · Hardware &amp; Installation<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 11 — BOOTING & LICENSING ═══════════════════════════════ -->"}, {"id": "m3-slide-11", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 11, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-11\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col blue-panel\">\n    <div class=\"panel-visual\">\n      <span class=\"big-icon\">🔑<\/span>\n      <div class=\"panel-heading\">Remote-First<br><em>Provisioning<\/em><\/div>\n      <div>\n        <span class=\"panel-tag\">🖥️ Remote Setup<\/span>\n        <span class=\"panel-tag\">☁️ Cloud Sync<\/span>\n        <span class=\"panel-tag\">📋 License Key<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"eyebrow\">Workflow<\/div>\n    <h2>Booting &amp; <em>Licensing<\/em><\/h2>\n    <p style=\"font-size:14px; color:#475569; font-style:italic;\">The Workflow: Remote-First Provisioning<\/p>\n    <div class=\"boot-steps\">\n      <div class=\"boot-step\">\n        <div class=\"step-badge\">1<\/div>\n        <div>\n          <strong>The Handshake<\/strong>\n          <p>Initiate Remote Login from the Dealer Portal to access the unique License Key in the Property Admin Portal.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"boot-step\">\n        <div class=\"step-badge\">2<\/div>\n        <div>\n          <strong>Pre-Programming<\/strong>\n          <p>Program settings, users, and configurations before arriving on-site. The device can be fully provisioned in the office.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"boot-step\">\n        <div class=\"step-badge\">3<\/div>\n        <div>\n          <strong>On-Site Install<\/strong>\n          <p>Mount with the required backbox, connect Power/Ethernet, and enter the License Key to sync the serial number.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"boot-step\">\n        <div class=\"step-badge\">4<\/div>\n        <div>\n          <strong>Cloud Sync<\/strong>\n          <p>All pre-programmed data automatically downloads from the cloud to the hardware.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">💡<\/span>\n      <div><strong>Zero-Touch Onsite:<\/strong> Provision and troubleshoot remotely so the device is \"Ready to Run\" before installation. <strong>License Keys are only visible via the Dealer Admin View (Remote Login).<\/strong><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 03 · Hardware &amp; Installation<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 12 — SUMMARY ═══════════════════════════════ -->"}, {"id": "m3-slide-12", "modNum": 3, "modTitle": "Hardware & Installation", "modEmoji": "🔧", "slideNum": 12, "total": 12, "html": "<div class=\"slide\" id=\"m3-slide-12\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-panel\">\n    <div class=\"left-panel-inner\">\n      <div class=\"module-label\">Module 03 Complete<\/div>\n      <h2>Module<br><em>Summary<\/em><\/h2>\n    <\/div>\n  <\/div>\n  <div class=\"right-panel\">\n    <div class=\"section-label\">Key Takeaways<\/div>\n    <div class=\"takeaway-grid\">\n      <div class=\"takeaway-col\">\n        <h4>Core Hardware<\/h4>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">🏢<\/div>\n          <div class=\"tk-text\"><strong>VUE-7R<\/strong><p>Main building entrances and lobbies.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">🚪<\/div>\n          <div class=\"tk-text\"><strong>VUE 5-ER<\/strong><p>Narrow frames or interior office retrofits.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">📲<\/div>\n          <div class=\"tk-text\"><strong>VUE-QR<\/strong><p>Secondary points; no wiring required.<\/p><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"takeaway-col\">\n        <h4>Power &amp; Wiring<\/h4>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">📡<\/div>\n          <div class=\"tk-text\"><strong>PoE+<\/strong><p>Max 200ft on Cat6; only 40ft on Cat5.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">⚡<\/div>\n          <div class=\"tk-text\"><strong>12V DC<\/strong><p>Min 3-amp supply; 16 AWG wire required.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">🔒<\/div>\n          <div class=\"tk-text\"><strong>Lock Power<\/strong><p>Upgrade to 5-amp if powering locks from A1.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">⚠️<\/div>\n          <div class=\"tk-text\"><strong>PoE Safety<\/strong><p>Do not power locks via PoE.<\/p><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"takeaway-col\">\n        <h4>Provisioning &amp; Reliability<\/h4>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">🔑<\/div>\n          <div class=\"tk-text\"><strong>Licensing<\/strong><p>Keys are bonded to serial numbers.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">☁️<\/div>\n          <div class=\"tk-text\"><strong>Cloud Sync<\/strong><p>Program remotely before arriving on-site.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">🔀<\/div>\n          <div class=\"tk-text\"><strong>Relay 2<\/strong><p>Always wire as local backup for outages.<\/p><\/div>\n        <\/div>\n        <div class=\"takeaway-item-sm\">\n          <div class=\"tk-dot\">🚫<\/div>\n          <div class=\"tk-text\"><strong>E Port<\/strong><p>Leave empty — not used.<\/p><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n      <div class=\"ttl\">Dealer<br><em>Admin Portal<\/em><\/div>\n      <span class=\"chip\">🏢 Accounts<\/span>\n      <span class=\"chip\">➕ Add Account<\/span>\n      <span class=\"chip\">🔑 Remote Login<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 3 ══ -->\n<div class=\"lbl\">Slide 3 of 12 — Remote Login Walkthrough<\/div>"}, {"id": "m4-s3", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 3, "total": 12, "html": "<div class=\"slide\" id=\"m4-s3\">\n  <div class=\"bar\"><\/div>\n  <div class=\"vwrap\">\n    <div class=\"vh\"><div class=\"eyebrow\">Demonstration<\/div><div class=\"sh\"><em>Remote Login<\/em> Walkthrough<\/div><\/div>\n    <div class=\"vph\"><div class=\"play\">▶<\/div><p>Video: Logging in remotely through the Partner Portal to the Admin Portal — accessing Dealer Admin View with System, Device, and Configuration options<\/p><\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 4 ══ -->\n<div class=\"lbl\">Slide 4 of 12 — Adding the Site<\/div>"}, {"id": "m4-s4", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 4, "total": 12, "html": "<div class=\"slide sl-s\" id=\"m4-s4\">\n  <div class=\"bar\"><\/div>\n  <div class=\"lft\">\n    <div class=\"eyebrow\">Step 2 · Site Setup<\/div>\n    <div class=\"sh\">Adding <em>the Site<\/em><\/div>\n    <p style=\"font-size:13px;color:#475569;font-style:italic;margin-bottom:2px;\">Before hardware can be added, the site must be created in the Dealer Admin Portal.<\/p>\n    <div class=\"steps\">\n      <div class=\"step\"><div class=\"sn\">1<\/div><p>Remotely log in to the account, click <strong>Sites<\/strong>, then <strong>Add New Site<\/strong><\/p><\/div>\n      <div class=\"step\"><div class=\"sn\">2<\/div><p><strong>Site Details:<\/strong> Enter the Site Name, Company Name, and primary Office Number<\/p><\/div>\n      <div class=\"step\"><div class=\"sn\">3<\/div><p><strong>Location Mapping:<\/strong> Provide the full Address, City, State, and ZIP<\/p><\/div>\n      <div class=\"step\"><div class=\"sn\">4<\/div><p><strong>Site Branding:<\/strong> Upload property images (PNG/JPEG, max 25MB) to customize the portal<\/p><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"rgt blue\">\n    <div class=\"bi\">\n      <span class=\"ico\">📍<\/span>\n      <div class=\"ttl\">Property<br><em>Foundation<\/em><\/div>\n      <span class=\"chip\">🏢 Site Name<\/span>\n      <span class=\"chip\">📍 Address &amp; ZIP<\/span>\n      <span class=\"chip\">🖼️ Branding<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 5 ══ -->\n<div class=\"lbl\">Slide 5 of 12 — Adding the Device<\/div>"}, {"id": "m4-s5", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 5, "total": 12, "html": "<div class=\"slide sl-s\" id=\"m4-s5\">\n  <div class=\"bar\"><\/div>\n  <div class=\"lft\">\n    <div class=\"eyebrow\">Step 3 · Device Setup<\/div>\n    <div class=\"sh\">Adding <em>the Device<\/em><\/div>\n    <div class=\"steps\">\n      <div class=\"step\"><div class=\"sn\">1<\/div><p>Click the <strong>Device tab<\/strong>, then select <strong>Add New Device<\/strong><\/p><\/div>\n      <div class=\"step\"><div class=\"sn\">2<\/div><p>Enter <strong>Display Name<\/strong>, Device Type, Site assignment, <strong>Timezone<\/strong>, and Boot Frequency<\/p><\/div>\n      <div class=\"step\"><div class=\"sn\">3<\/div><p>Optional: choose whether to <strong>abbreviate first or last names<\/strong> in the directory listing<\/p><\/div>\n    <\/div>\n    <div class=\"tip\"><span class=\"ti\">💡<\/span><div><strong>Important:<\/strong> It's a good idea to verify the <strong>Timezone<\/strong> before saving — an incorrect timezone can affect credential schedules on this device.<\/div><\/div>\n  <\/div>\n  <div class=\"rgt blue\">\n    <div class=\"bi\">\n      <span class=\"ico\">📟<\/span>\n      <div class=\"ttl\">Device<br><em>Configuration<\/em><\/div>\n      <span class=\"chip\">🕐 Timezone<\/span>\n      <span class=\"chip\">🔄 Boot Frequency<\/span>\n      <span class=\"chip\">🔤 Name Format<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 6 ══ -->\n<div class=\"lbl\">Slide 6 of 12 — Customizing the User Experience<\/div>"}, {"id": "m4-s6", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 6, "total": 12, "html": "<div class=\"slide\" id=\"m4-s6\">\n  <div class=\"bar\"><\/div>\n  <div class=\"wrap\">\n    <div><div class=\"eyebrow\">Device Configuration<\/div><div class=\"sh\">Adding the Device: <em>Customizing the User Experience<\/em><\/div><\/div>\n    <div class=\"ux-grid\">\n      <div class=\"ux-card\">\n        <h3>🎨 Branding &amp; Identity<\/h3>\n        <ul>\n          <li><strong>Displayed Phone Number<\/strong> — number shown on the panel face<\/li>\n          <li><strong>Site Name &amp; Address<\/strong> — displayed on the panel screen<\/li>\n          <li><strong>Logo<\/strong> — upload a property or company logo<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"ux-card\">\n        <h3>🔘 Interface Toggles<\/h3>\n        <ul>\n          <li><strong>Office Button<\/strong> — enable or disable as needed<\/li>\n          <li><strong>Directory Button<\/strong> — show or hide resident directory<\/li>\n          <li><strong>PIN Buttons<\/strong> — toggle keypad PIN entry on/off<\/li>\n          <li><strong>Tap to Unlock<\/strong> — enable or disable touchscreen unlock<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"ux-card\">\n        <h3>🔒 Unlock &amp; Updates<\/h3>\n        <ul>\n          <li><strong>Unlocking Mode<\/strong> — set to MyDoorView for cloud control<\/li>\n          <li><strong>Screen Layout<\/strong> — choose Portrait or Landscape<\/li>\n          <li><strong>Refresh Rate<\/strong> — how often device syncs data from cloud<\/li>\n        <\/ul>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 7 ══ -->\n<div class=\"lbl\">Slide 7 of 12 — Programming Relays<\/div>"}, {"id": "m4-s7", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 7, "total": 12, "html": "<div class=\"slide sl-f\" id=\"m4-s7\">\n  <div class=\"bar\"><\/div>\n  <div class=\"lft\">\n    <div class=\"eyebrow\">Device Configuration<\/div>\n    <div class=\"sh\">Adding the Device: <em>Programming Relays<\/em><\/div>\n    <p style=\"font-size:13px;color:#475569;font-style:italic;margin-bottom:4px;\">Entry Timing &amp; Fail-over Logic<\/p>\n    <div class=\"feats\">\n      <div class=\"feat\"><div class=\"fi\">🔀<\/div><p><strong>Relay State —<\/strong> Define if Relay 1 &amp; 2 are Normally Open (NO) or Normally Closed (NC)<\/p><\/div>\n      <div class=\"feat\"><div class=\"fi\">⏱️<\/div><p><strong>Timing —<\/strong> Program the Unlock Duration between 0 and 99 seconds<\/p><\/div>\n      <div class=\"feat\"><div class=\"fi\">🏷️<\/div><p><strong>Naming —<\/strong> Assign relay names (e.g. \"Main Gate\") for identification in audit logs<\/p><\/div>\n      <div class=\"feat\"><div class=\"fi\">🔢<\/div><p><strong>PIN Access —<\/strong> Toggle Resident PIN &amp; Guest PIN and set their active schedule<\/p><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"rgt\" style=\"display:flex;flex-direction:column;\">\n    <div class=\"relay-panel\" style=\"flex:1;\">\n      <div class=\"rc\">\n        <div class=\"rl\">Relay 1 · Primary<\/div>\n        <h4>Main Entrance<\/h4>\n        <div class=\"tags\"><span class=\"tag\">Normally Open<\/span><span class=\"tag\">5 sec unlock<\/span><span class=\"tag\">Resident PIN ✓<\/span><\/div>\n      <\/div>\n      <div class=\"rc\">\n        <div class=\"rl\">Relay 2 · Backup<\/div>\n        <h4>Side Gate<\/h4>\n        <div class=\"tags\"><span class=\"tag\">Normally Open<\/span><span class=\"tag\">10 sec unlock<\/span><span class=\"tag w\">Local Backup<\/span><\/div>\n      <\/div>\n      <div class=\"tc\">\n        <div class=\"tl\">Unlock Duration Range<\/div>\n        <div class=\"ttrack\"><div class=\"tfill\"><\/div><\/div>\n        <div class=\"tlbls\"><span>0 sec<\/span><span>0–99 seconds<\/span><span>99 sec<\/span><\/div>\n      <\/div>\n      <div class=\"tip\"><span class=\"ti\">💡<\/span><div><strong>Remember:<\/strong> It's recommended to wire Relay 2 as a local backup in case of internet outages.<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 8 ══ -->\n<div class=\"lbl\">Slide 8 of 12 — Bonding &amp; Status<\/div>"}, {"id": "m4-s8", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 8, "total": 12, "html": "<div class=\"slide sl-f\" id=\"m4-s8\">\n  <div class=\"bar\"><\/div>\n  <div class=\"lft\">\n    <div class=\"eyebrow\">Device Provisioning<\/div>\n    <div class=\"sh\">Adding the Device: <em>Bonding &amp; Status<\/em><\/div>\n    <p style=\"font-size:13px;color:#475569;font-style:italic;margin-bottom:4px;\">Hardware Provisioning &amp; Health Check<\/p>\n    <div class=\"feats\">\n      <div class=\"feat\"><div class=\"fi\">🔗<\/div><p><strong>Serial Number Bonding —<\/strong> Enter the Device Serial Number to bond hardware to your cloud config<\/p><\/div>\n      <div class=\"feat\"><div class=\"fi\">📡<\/div><p><st  class=\"chip\">🔢 Door PIN<\/span>\n      <span class=\"chip\">📅 Schedule<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 11 ══ -->\n<div class=\"lbl\">Slide 11 of 12 — Adding a User Video<\/div>"}, {"id": "m4-s11", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 11, "total": 12, "html": "<div class=\"slide\" id=\"m4-s11\">\n  <div class=\"bar\"><\/div>\n  <div class=\"vwrap\">\n    <div class=\"vh\"><div class=\"eyebrow\">Demonstration<\/div><div class=\"sh\">Adding a User &amp; <em>Assigning Access<\/em><\/div><\/div>\n    <div class=\"vph\"><div class=\"play\">▶<\/div><p>Video: Adding a user and assigning user access<\/p><\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>\n\n<!-- ══ SLIDE 12 ══ -->\n<div class=\"lbl\">Slide 12 of 12 — Summary<\/div>"}, {"id": "m4-s12", "modNum": 4, "modTitle": "System Configuration", "modEmoji": "⚙️", "slideNum": 12, "total": 12, "html": "<div class=\"slide\" id=\"m4-s12\">\n  <div class=\"bar\"><\/div>\n  <div class=\"lp\">\n    <div class=\"lp-in\">\n      <div class=\"lp-lbl\">Module 04 Complete<\/div>\n      <div class=\"lp-h\">Module<br><em>Summary<\/em><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"rp\">\n    <div class=\"rp-lbl\">Key Takeaways<\/div>\n    <div class=\"tklist\">\n      <div class=\"tkrow\">\n        <div class=\"tkbadge\">01<\/div>\n        <p><strong>Hierarchy:<\/strong> Setup generally follows the order — <strong>Account → Site → Device → User<\/strong> — for the smoothest experience<\/p>\n      <\/div>\n      <div class=\"tkrow\">\n        <div class=\"tkbadge\">02<\/div>\n        <p><strong>Critical Settings:<\/strong> Verify <strong>Timezone<\/strong> and <strong>Relay States<\/strong> before finalizing — these affect schedules and hardware behavior<\/p>\n      <\/div>\n      <div class=\"tkrow\">\n        <div class=\"tkbadge\">03<\/div>\n        <p><strong>Hardware Bonding:<\/strong> The <strong>Serial Number<\/strong> bonds to a <strong>License Key<\/strong> to link physical hardware to cloud logic<\/p>\n      <\/div>\n      <div class=\"tkrow\">\n        <div class=\"tkbadge\">04<\/div>\n        <p><strong>Diagnostic Verification:<\/strong> Before leaving a site, it's recommended to confirm <strong>Online status<\/strong> and perform a Ping or Video Call<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"foot\"><span>MyDoorView · MCTS Certification Program<\/span><span>Module 04 · System Configuration &amp; Setup<\/span><\/div>\n<\/div>"}, {"id": "m5-slide-1", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 1, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-1\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"hero-left\">\n    <div class=\"module-chip\"><span class=\"chip-dot\"><\/span>Module 05<\/div>\n    <h1>Integration<br><em>Architecture<\/em><\/h1>\n    <p class=\"hero-sub\">Bridge the gap between video entry and professional access control for a unified \"Single Pane of Glass\" management experience.<\/p>\n  <\/div>\n  <div class=\"hero-right\">\n    <div class=\"hero-badge\">\n      <span class=\"badge-icon\">🔗<\/span>\n      <div class=\"badge-title\">ACS + Video<br><em style=\"font-style:italic;color:#90e0ef;\">Unified<\/em><\/div>\n      <div class=\"badge-pill\">PDK · Brivo · Kantech<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>\n\n<!-- ══════════ SLIDE 2 — WHY INTEGRATE ══════════ -->"}, {"id": "m5-slide-2", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 2, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-2\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Why Integrate?<\/div>\n      <h2 class=\"slide-title\">The <em>\"Two Lines of Sight\"<\/em> Advantage<\/h2>\n    <\/div>\n    <div class=\"benefits-grid\">\n      <div class=\"benefit-card card-base\">\n        <div class=\"benefit-icon\">🗄️<\/div>\n        <h3>Unified Database<\/h3>\n        <p>Adding or deleting a user in the ACS automatically synchronizes with MyDoorView, eliminating double data entry entirely.<\/p>\n      <\/div>\n      <div class=\"benefit-card card-base\">\n        <div class=\"benefit-icon\">📹<\/div>\n        <h3>Video Verification<\/h3>\n        <p>Managers get the security of an ACS event log combined with live HD video verification provided by the VUE intercom.<\/p>\n      <\/div>\n      <div class=\"benefit-card card-base\">\n        <div class=\"benefit-icon\">☁️<\/div>\n        <h3>Cloud-Native Synergy<\/h3>\n        <p>Both platforms are 100% cloud-based — no on-site servers or local software to maintain. Fully managed from anywhere.<\/p>\n      <\/div>\n      <div class=\"benefit-card card-base\">\n        <div class=\"benefit-icon\">🏢<\/div>\n        <h3>Centralized Management<\/h3>\n        <p>Manage multiple properties and thousands of users from a single web dashboard with unified access event logging.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>\n\n<!-- ══════════ SLIDE 3 — UNLOCK WORKFLOW ══════════ -->"}, {"id": "m5-slide-3", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 3, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-3\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">How the API Handshake Works<\/div>\n      <h2 class=\"slide-title\">The Integrated <em>Unlock Workflow<\/em><\/h2>\n    <\/div>\n    <div class=\"workflow-steps\">\n      <div class=\"wf-step\">\n        <div class=\"wf-num\">🔔<\/div>\n        <div class=\"wf-card\">\n          <div class=\"wf-icon\">🚪<\/div>\n          <h3>The Interaction<\/h3>\n          <p>A visitor calls a resident via the VUE-7R panel or scans a VUE-QR placard at the entrance.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"wf-step\">\n        <div class=\"wf-num\">👁️<\/div>\n        <div class=\"wf-card\">\n          <div class=\"wf-icon\">📱<\/div>\n          <h3>The Decision<\/h3>\n          <p>The resident verifies the visitor via HD video and taps the \"Unlock\" button in the MyDoorView app.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"wf-step\">\n        <div class=\"wf-num\">☁️<\/div>\n        <div class=\"wf-card\">\n          <div class=\"wf-icon\">🔐<\/div>\n          <h3>The Cloud Handshake<\/h3>\n          <p>MyDoorView Cloud sends an encrypted API command to the Partner Cloud (PDK / Brivo / Kantech).<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"wf-step\">\n        <div class=\"wf-num\">📡<\/div>\n        <div class=\"wf-card\">\n          <div class=\"wf-icon\">🖥️<\/div>\n          <h3>The Command<\/h3>\n          <p>Partner Cloud validates the request and forwards an unlock instruction to the on-site ACS controller.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"wf-step\">\n        <div class=\"wf-num\">✅<\/div>\n        <div class=\"wf-card\">\n          <div class=\"wf-icon\">⚡<\/div>\n          <h3>The Strike<\/h3>\n          <p>The partner controller fires its local relay to unlock the door. Access is granted and logged in both systems.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>\n\n<!-- ══════════ SLIDE 4 — TECHNICAL CONFIG ══════════ -->"}, {"id": "m5-slide-4", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 4, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-4\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"hero-left\" style=\"width:50%;padding:52px 40px 52px 56px;display:flex;flex-direction:column;justify-content:center;padding-bottom:calc(44px + 12px);\">\n    <div class=\"eyebrow\">Dealer Admin View<\/div>\n    <h2 style=\"font-family:'DM Serif Display',serif;font-size:38px;color:#0a1628;font-weight:400;margin-bottom:28px;line-height:1.2;\">Technical <em style=\"font-style:italic;color:#0077b6;\">Configuration<\/em><\/h2>\n    <div class=\"config-steps\">\n      <div class=\"config-step\">\n        <div class=\"config-step-icon\">🔑<\/div>\n        <div>\n          <strong>Elevated Permissions<\/strong>\n          <p>All integration setup is performed within the Dealer Admin View — standard partner logins cannot access these settings.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"config-step\">\n        <div class=\"config-step-icon\">🔗<\/div>\n        <div>\n          <strong>API Keys<\/strong>\n          <p>Input the API keys or login credentials provided by the partner ACS system to establish the cloud-to-cloud link.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"config-step\">\n        <div class=\"config-step-icon\">🗺️<\/div>\n        <div>\n          <strong>Device Mapping<\/strong>\n          <p>Each physical MDV device must be manually mapped to its corresponding \"Door\" or \"Site\" in the partner software.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"config-step\">\n        <div class=\"config-step-icon\">🔄<\/div>\n        <div>\n          <strong>Credential Sync<\/strong>\n          <p>Wiegand data and user PINs are typically managed in the ACS and synced down to the MDV hardware automatically.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"hero-right\" style=\"width:50%;background:linear-gradient(150deg,#004e80,#0077b6 55%,#00b4d8);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding-bottom:44px;\">\n    <div style=\"content:'';position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.07);\"><\/div>\n    <div class=\"config-visual\">\n      <span class=\"big-icon\">⚙️<\/span>\n      <div class=\"cv-heading\">Integration <em>Partners<\/em><\/div>\n      <div>\n        <span class=\"partner-tag\">PDK<\/span>\n        <span class=\"partner-tag\">Brivo<\/span>\n        <span class=\"partner-tag\">Kantech<\/span>\n      <\/div>\n      <div style=\"margin-top:24px;background:rgba(255,255,255,0.12);border-radius:10px;padding:18px 22px;text-align:left;\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;opacity:0.7;margin-bottom:10px;\">Setup Checklist<\/div>\n        <div style=\"font-size:13px;display:flex;flex-direction:column;gap:8px;\">\n          <div>✅ <span>Obtain API credentials from ACS partner<\/span><\/div>\n          <div>✅ <span>Enter keys in Dealer Admin portal<\/span><\/div>\n          <div>✅ <span>Map each MDV device to ACS door<\/span><\/div>\n          <div>✅ <span>Test sync with a sample user credential<\/span><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>\n\n<!-- ══════════ SLIDE 5 — VIDEO WALKTHROUGHS ══════════ -->"}, {"id": "m5-slide-5", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 5, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-5\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Dealer Admin Portal Setup<\/div>\n      <h2 class=\"slide-title\">Integration <em>Video Walkthroughs<\/em><\/h2>\n    <\/div>\n    <div class=\"video-grid\">\n      <div class=\"video-card\">\n        <div class=\"video-placeholder-area\">\n          <div class=\"play-btn\">▶<\/div>\n          <p>Brivo Integration Setup<\/p>\n        <\/div>\n        <div class=\"video-label\">\n          <h3>Brivo — Dealer Admin Portal Configuration<\/h3>\n          <p>Full walkthrough: API keys, site mapping, and credential sync<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"video-card\">\n        <div class=\"video-placeholder-area\">\n          <div class=\"play-btn\">▶<\/div>\n          <p>PDK Integration Setup<\/p>\n        <\/div>\n        <div class=\"video-label\">\n          <h3>PDK — Dealer Admin Portal Configuration<\/h3>\n          <p>Full walkthrough: API keys, site mapping, and credential sync<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>\n\n<!-- ══════════ SLIDE 6 — WIRING ══════════ -->"}, {"id": "m5-slide-6", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 6, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-6\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Wiegand &amp; The Relay 2 Safety Net<\/div>\n      <h2 class=\"slide-title\">Critical <em>Integration Wiring<\/em><\/h2>\n    <\/div>\n    <div class=\"wiring-grid\">\n      <div class=\"wiring-card card-base\">\n        <div class=\"wc-header\"><div class=\"wc-icon\">📟<\/div><h3>VUE-7R Integration<\/h3><\/div>\n        <p>Utilizes an embedded slot for a partner's physical mullion reader. Data is passed via the A-Port bank (A6–A10) to the partner controller.<\/p>\n        <div class=\"wc-tag\">A-Port: A6–A10<\/div>\n      <\/div>\n      <div class=\"wiring-card card-base\">\n        <div class=\"wc-header\"><div class=\"wc-icon\">🔌<\/div><h3>VUE-5ER Integration<\/h3><\/div>\n        <p>Uses a built-in Wavelynx APEX Reader. All wiring is handled via a 9-wire pigtail, which includes 12V, OSDP, and Relay connections.<\/p>\n        <div class=\"wc-tag\">9-Wire Pigtail<\/div>\n      <\/div>\n      <div class=\"wiring-card card-base\">\n        <div class=\"wc-header\"><div class=\"wc-icon\">📲<\/div><h3>VUE-QR Integration<\/h3><\/div>\n        <p>A non-electronic placard requiring no wiring or power. Triggers access entirely through a Cloud-to-Cloud API handshake between MDV and partner.<\/p>\n        <div class=\"wc-tag\">Cloud-to-Cloud Only<\/div>\n      <\/div>\n      <div class=\"wiring-card card-base\" style=\"border-left:4px solid #e03131;\">\n        <div class=\"wc-header\"><div class=\"wc-icon\" style=\"background:linear-gradient(135deg,#c92a2a,#e03131);\">🛡️<\/div><h3>The \"Safety Net\" — Relay 2<\/h3><\/div>\n        <p>Wire Relay 2 (B4–B6 on VUE-7R) directly to the lock. Ensures residents can still enter via local credentials if the internet or API link fails.<\/p>\n        <div class=\"wc-tag\" style=\"background:#fff0f0;border-color:#ffa8a8;color:#c92a2a;\">Relay 2: Offline Failover<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">💡<\/span>\n      <div><strong>Pro Tip:<\/strong> Always wire Relay 2 as a local fail-over on every integration job. This single step is what separates a good install from a great one — it guarantees resident access survives any network or cloud outage.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>\n\n<!-- ══════════ SLIDE 7 — TROUBLESHOOTING ══════════ -->"}, {"id": "m5-slide-7", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 7, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-7\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Diagnostic Logic<\/div>\n      <h2 class=\"slide-title\">Troubleshooting <em>Integration Issues<\/em><\/h2>\n    <\/div>\n    <div class=\"trouble-list\">\n      <div class=\"trouble-item\">\n        <span class=\"trouble-icon\">🚫<\/span>\n        <div>\n          <strong>Access Denied — No Event Log<\/strong>\n          <p>If a credential is denied at the panel but no event appears in the MDV log, the issue is internal to the Partner Software. Check for expired users or incorrect permission levels in Brivo/PDK.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"trouble-item\">\n        <span class=\"trouble-icon\">🔒<\/span>\n        <div>\n          <strong>Access Granted — Door Stays Locked<\/strong>\n          <p>If the log shows \"Access Granted\" and the relay clicks but the door remains locked, the issue is physical wiring between the relay (or partner controller) and the lock hardware.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"trouble-item\">\n        <span class=\"trouble-icon\">🌐<\/span>\n        <div>\n          <strong>Video Fails / Black Screen<\/strong>\n          <p>If remote unlock works but video calls show a black screen, the local firewall is blocking high-bandwidth video ports. The D-Port requires no inbound forwarding, but outbound video traffic must be allowed.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"trouble-item\">\n        <span class=\"trouble-icon\">📍<\/span>\n        <div>\n          <strong>VUE-QR \"Away from Door\" Error<\/strong>\n          <p>This indicates a geo-fencing failure. The user must enable <strong>precise location services<\/strong> on their device to verify they are physically at the entrance when scanning the placard.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>\n\n<!-- ══════════ SLIDE 8 — KEY TAKEAWAYS ══════════ -->"}, {"id": "m5-slide-8", "modNum": 5, "modTitle": "Access Control Integrations", "modEmoji": "🔗", "slideNum": 8, "total": 8, "html": "<div class=\"slide\" id=\"m5-slide-8\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-panel\">\n    <div class=\"left-panel-inner\">\n      <span class=\"module-icon\">🔗<\/span>\n      <div class=\"module-label\">Module 05 Complete<\/div>\n      <h2>Key<br><em>Takeaways<\/em><\/h2>\n    <\/div>\n  <\/div>\n  <div class=\"right-panel\">\n    <div class=\"eyebrow\">What You've Learned<\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">1<\/div>\n      <div>\n        <strong>Front-End / Back-End Roles<\/strong>\n        <p>MDV is the video interface and resident experience; the ACS (PDK/Brivo) is the security logic and hardware muscle.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">2<\/div>\n      <div>\n        <strong>Cloud-to-Cloud Architecture<\/strong>\n        <p>Most interactions happen via an API trigger between the two cloud platforms — no on-site software required.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">3<\/div>\n      <div>\n        <strong>Data Harmony<\/strong>\n        <p>Integrated systems share a single database, reducing administrative errors and eliminating duplicate user management.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">4<\/div>\n      <div>\n        <strong>Hardware Reliability via Relay 2<\/strong>\n        <p>Wiring Relay 2 for local fail-over is the <em>only<\/em> way to guarantee access during a network or cloud outage.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView Certified Tech Series<\/span>\n    <span>Module 05 — Integration Architecture<\/span>\n  <\/div>\n<\/div>"}, {"id": "m6-slide-1", "modNum": 6, "modTitle": "Troubleshooting & OBF", "modEmoji": "🛠️", "slideNum": 1, "total": 6, "html": "<div class=\"slide\" id=\"m6-slide-1\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"hero-left\">\n    <div class=\"module-chip\"><span class=\"chip-dot\"><\/span>Module 06<\/div>\n    <h1>Installation <em>Troubleshooting<\/em> &amp; Out-of-Box Failure<\/h1>\n    <p class=\"hero-sub\">Ensuring long-term reliability through proactive maintenance, remote diagnostics, and official hardware support protocols.<\/p>\n  <\/div>\n  <div class=\"hero-right\">\n    <div class=\"hero-badge\">\n      <span class=\"badge-icon\">🔧<\/span>\n      <div class=\"badge-title\">Field Diagnostics &amp; Hardware Support<\/div>\n      <span class=\"badge-pill\">OBF Protocol<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification<\/span>\n    <span>Module 06 · Troubleshooting &amp; OBF<\/span>\n  <\/div>\n<\/div>\n\n<!-- ============================================================ SLIDE 2 ============================================================ -->"}, {"id": "m6-slide-2", "modNum": 6, "modTitle": "Troubleshooting & OBF", "modEmoji": "🛠️", "slideNum": 2, "total": 6, "html": "<div class=\"slide\" id=\"m6-slide-2\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <h2 class=\"slide-title\">The <em>Diagnostic<\/em> Workflow<\/h2>\n    <div class=\"diag-steps\">\n      <div class=\"diag-step\">\n        <div class=\"diag-num\">1<\/div>\n        <div class=\"diag-step-text\">\n          <strong>Device Status Verification —<\/strong>\n          <p>Check the portal to confirm the unit is <strong>Online<\/strong> or <strong>Offline<\/strong> (power/network vs. software issue).<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"diag-step\">\n        <div class=\"diag-num\">2<\/div>\n        <div class=\"diag-step-text\">\n          <strong>The Ping Test —<\/strong>\n          <p>Use <strong>Click to Ping Panel<\/strong> to verify active, low-latency communication with the MDV Cloud.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"diag-step\">\n        <div class=\"diag-num\">3<\/div>\n        <div class=\"diag-step-text\">\n          <strong>Remote Power Cycle —<\/strong>\n          <p>Use <strong>Click to Reboot Panel<\/strong> to resolve software hangs or refresh the directory without a site visit.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"diag-step\">\n        <div class=\"diag-num\">4<\/div>\n        <div class=\"diag-step-text\">\n          <strong>Last Seen Log —<\/strong>\n          <p>Review the <strong>Last Seen<\/strong> timestamp to determine exactly when the device lost connectivity.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">💡<\/span>\n      <div><strong>Pro-Tip:<\/strong> Before rolling a truck, always use the Dealer Admin View to perform a remote system verification — it saves time and cost.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"diag-visual\">\n      <span class=\"big-icon\">📡<\/span>\n      <div class=\"dv-title\">Remote Troubleshooting<br/><em>via Dealer Admin<\/em><\/div>\n      <div class=\"diag-tag\">🔄 Click to Ping<\/div>\n      <div class=\"diag-tag\">⚡ Click to Reboot<\/div>\n      <div class=\"diag-tag\">🕐 Last Seen Log<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification<\/span>\n    <span>Module 06 · Troubleshooting &amp; OBF<\/span>\n  <\/div>\n<\/div>\n\n<!-- ============================================================ SLIDE 3 ============================================================ -->"}, {"id": "m6-slide-3", "modNum": 6, "modTitle": "Troubleshooting & OBF", "modEmoji": "🛠️", "slideNum": 3, "total": 6, "html": "<div class=\"slide\" id=\"m6-slide-3\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Environmental Maintenance<\/div>\n      <h2 class=\"slide-title\">Protecting the <em>Hardware &amp; Warranty<\/em><\/h2>\n    <\/div>\n    <div class=\"warranty-banner\">\n      <span class=\"wb-icon\">⚠️<\/span>\n      <p><strong>Warranty Notice:<\/strong> Physical damage caused by improper maintenance is <strong>not covered<\/strong> by the MyDoorView warranty. Follow these guidelines to maintain coverage.<\/p>\n    <\/div>\n    <div class=\"maint-grid\">\n      <div class=\"maint-card care\">\n        <span class=\"maint-icon\">🖥️<\/span>\n        <div class=\"maint-title\">Screen Care<\/div>\n        <div class=\"maint-body\">Clean the touch interface with a <strong>soft cloth only<\/strong>. Gentle, non-abrasive cleaning preserves the protective coating and display clarity.<\/div>\n        <span class=\"maint-badge\">✅ Soft Cloth Only<\/span>\n      <\/div>\n      <div class=\"maint-card chemical\">\n        <span class=\"maint-icon\">🧪<\/span>\n        <div class=\"maint-title\">Chemical Warning<\/div>\n        <div class=\"maint-body\"><strong>Never<\/strong> use harsh chemicals, window cleaners, or abrasive materials — they permanently damage the screen's protective coating.<\/div>\n        <span class=\"maint-badge\">🚫 No Chemicals<\/span>\n      <\/div>\n      <div class=\"maint-card water\">\n        <span class=\"maint-icon\">💧<\/span>\n        <div class=\"maint-title\">Water Safety<\/div>\n        <div class=\"maint-body\">Avoid direct contact with high-pressure washers or irrigation spray. Ensure the backbox is properly sealed to maintain the <strong>IP65 rating<\/strong>.<\/div>\n        <span class=\"maint-badge\">🛡️ IP65 Rated<\/span>\n      <\/div>\n      <div class=\"maint-card sun\">\n        <span class=\"maint-icon\">☀️<\/span>\n        <div class=\"maint-title\">Sunlight Mitigation<\/div>\n        <div class=\"maint-body\">De-lamination from direct South-facing sunlight is classified as <strong>environmental damage<\/strong>, not a defect. Use shading or hoods where needed.<\/div>\n        <span class=\"maint-badge\">⚠️ Env. Damage<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification<\/span>\n    <span>Module 06 · Troubleshooting &amp; OBF<\/span>\n  <\/div>\n<\/div>\n\n<!-- ============================================================ SLIDE 4 ============================================================ -->"}, {"id": "m6-slide-4", "modNum": 6, "modTitle": "Troubleshooting & OBF", "modEmoji": "🛠️", "slideNum": 4, "total": 6, "html": "<div class=\"slide\" id=\"m6-slide-4\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Common Field Scenarios<\/div>\n      <h2 class=\"slide-title\">Identifying <em>Root Causes<\/em><\/h2>\n    <\/div>\n    <div class=\"field-table-wrap\">\n      <div class=\"field-table-header\">\n        <span>Symptom<\/span>\n        <span>Probable Cause<\/span>\n        <span>Corrective Action<\/span>\n      <\/div>\n      <div class=\"field-row\">\n        <div><span class=\"symptom-tag\">🔒 \"Unlicensed\" Screen<\/span><\/div>\n        <div class=\"cause-text\">Serial Number mismatch or license not reset after a swap.<\/div>\n        <div class=\"action-text\">Contact MDV Tech Support to reset the license key for the new serial number.<\/div>\n      <\/div>\n      <div class=\"field-row\">\n        <div><span class=\"symptom-tag\">📅 Door Unlock Fails<\/span><\/div>\n        <div class=\"cause-text\">Incorrect Property Time Zone setting in the portal.<\/div>\n        <div class=\"action-text\">Verify and update the Time Zone in General settings of the device.<\/div>\n      <\/div>\n      <div class=\"field-row\">\n        <div><span class=\"symptom-tag\">📶 Intermittent Connection<\/span><\/div>\n        <div class=\"cause-text\">Wire run exceeds linear footage limits or poor termination.<\/div>\n        <div class=\"action-text\">Verify Cat5 &lt;40ft or Cat6 &lt;200ft; re-terminate RJ45 ends.<\/div>\n      <\/div>\n      <div class=\"field-row\">\n        <div><span class=\"symptom-tag\">⚡ Strike Won't Fire<\/span><\/div>\n        <div class=\"cause-text\">Amperage starvation — using less than 5 Amps for lock power.<\/div>\n        <div class=\"action-text\">Upgrade power supply to 5 Amps if powering a lock through the panel.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification<\/span>\n    <span>Module 06 · Troubleshooting &amp; OBF<\/span>\n  <\/div>\n<\/div>\n\n<!-- ============================================================ SLIDE 5 ============================================================ -->"}, {"id": "m6-slide-5", "modNum": 6, "modTitle": "Troubleshooting & OBF", "modEmoji": "🛠️", "slideNum": 5, "total": 6, "html": "<div class=\"slide\" id=\"m6-slide-5\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">Hardware Replacement<\/div>\n    <h2 class=\"slide-title\">Out-of-Box Failure <em>(OBF)<\/em> Protocol<\/h2>\n    <div class=\"lead\">Official Steps — Do Not Deviate<\/div>\n    <div class=\"obf-steps\">\n      <div class=\"obf-step\">\n        <div class=\"obf-num\">1<\/div>\n        <div class=\"obf-step-text\">\n          <strong>No Field Service —<\/strong>\n          <p>Do not open the unit or attempt internal repairs. Unauthorized service <strong>voids the warranty<\/strong>.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"obf-step\">\n        <div class=\"obf-num\">2<\/div>\n        <div class=\"obf-step-text\">\n          <strong>Document the Issue —<\/strong>\n          <p>Capture photos or video of the failure and note the <strong>Device Serial Number<\/strong>.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"obf-step\">\n        <div class=\"obf-num\">3<\/div>\n        <div class=\"obf-step-text\">\n          <strong>Contact Technical Support —<\/strong>\n          <p>Call <strong>888-575-6891 ext. 103<\/strong> or email <strong><a href=\"/cdn-cgi/l/email-protection\" class=\"__cf_email__\" data-cfemail=\"13406663637c6167535e6a577c7c61457a76643d707c7e\">[email&#160;protected]<\/a><\/strong> to open a ticket.<\/p>\n        <\/div>\n      <\/div>\n      <div class=\"obf-step\">\n        <div class=\"obf-num\">4<\/div>\n        <div class=\"obf-step-text\">\n          <strong>RMA Process —<\/strong>\n          <p>Support will issue a return authorization; MDV Admin resets the license key for the replacement panel.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"obf-visual\">\n      <span class=\"big-icon\">📦<\/span>\n      <div class=\"ov-title\">Factory Failure?<br/><em>Follow the Protocol<\/em><\/div>\n      <div class=\"contact-pill\">\n        <strong>📞 Phone Support<\/strong>\n        888-575-6891 ext. 103\n      <\/div>\n      <div class=\"contact-pill\">\n        <strong>✉️ Email Support<\/strong>\n        <a href=\"/cdn-cgi/l/email-protection\" class=\"__cf_email__\" data-cfemail=\"4c1f393c3c233e380c01350823233e1a25293b622f2321\">[email&#160;protected]<\/a>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification<\/span>\n    <span>Module 06 · Troubleshooting &amp; OBF<\/span>\n  <\/div>\n<\/div>\n\n<!-- ============================================================ SLIDE 6 ============================================================ -->"}, {"id": "m6-slide-6", "modNum": 6, "modTitle": "Troubleshooting & OBF", "modEmoji": "🛠️", "slideNum": 6, "total": 6, "html": "<div class=\"slide\" id=\"m6-slide-6\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-panel\">\n    <div class=\"eyebrow\">Module 06 Summary<\/div>\n    <h2>Key<br/>Takeaways<\/h2>\n    <p>Apply these principles every time you encounter a field issue — remote first, then on-site, always by the book.<\/p>\n  <\/div>\n  <div class=\"right-panel\">\n    <div class=\"section-label\">What You've Learned<\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">01<\/div>\n      <div class=\"takeaway-text\">\n        <strong>Diagnostics First<\/strong>\n        <p>Always use the Dealer Admin View tools (Ping / Reboot) before visiting the site to save time and cost.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">02<\/div>\n      <div class=\"takeaway-text\">\n        <strong>No Field Service<\/strong>\n        <p>Opening the unit without authorization voids the warranty. Escalate to MDV Support for all hardware failures.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">03<\/div>\n      <div class=\"takeaway-text\">\n        <strong>Power Verification<\/strong>\n        <p>Ensure amperage meets the 3-Amp / 5-Amp rules to avoid \"Ghost\" reboots or lock failures in the field.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"takeaway-item\">\n      <div class=\"takeaway-num\">04<\/div>\n      <div class=\"takeaway-text\">\n               <strong>Contact Support Properly<\/strong>\n        <p>Provide the Serial Number and a clear description of the issue when contacting MDV Support to expedite resolution.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification<\/span>\n    <span>Module 06 · Troubleshooting &amp; OBF<\/span>\n  <\/div>\n<\/div>\n\n  <\/div>\n<\/div>\n<script>\nconst SLIDE_IDS = [\"toc\", \"m0-slide-1\", \"m0-slide-2\", \"m0-slide-3\", \"m0-slide-4\", \"m0-slide-5\", \"m0-slide-6\", \"m1-slide-1\", \"m1-slide-2\", \"m1-slide-3\", \"m1-slide-4\", \"m1-slide-5\", \"m1-slide-6\", \"m1-slide-7\", \"m1-slide-8\", \"m1-slide-9\", \"m2-slide-1\", \"m2-slide-2\", \"m2-slide-3\", \"m2-slide-4\", \"m2-slide-5\", \"m2-slide-6\", \"m2-slide-7\", \"m2-slide-8\", \"m2-slide-9\", \"m2-slide-10\", \"m2-slide-11\", \"m2-slide-12\", \"m2-slide-13\", \"m2-slide-14\", \"m3-slide-1\", \"m3-slide-2\", \"m3-slide-3\", \"m3-slide-4\", \"m3-slide-5\", \"m3-slide-6\", \"m3-slide-7\", \"m3-slide-8\", \"m3-slide-9\", \"m3-slide-10\", \"m3-slide-11\", \"m3-slide-12\", \"m4-s1\", \"m4-s3\", \"m4-s6\", \"m4-s9\", \"m4-s11\", \"m4-s12\", \"m5-slide-1\", \"m5-slide-2\", \"m5-slide-3\", \"m5-slide-4\", \"m5-slide-5\", \"m5-slide-6\", \"m5-slide-7\", \"m5-slide-8\", \"m6-slide-1\", \"m6-slide-2\", \"m6-slide-3\", \"m6-slide-4\", \"m6-slide-5\", \"m6-slide-6\"];\nconst MODULE_STARTS = [0, 7, 16, 30, 42, 48, 56];\nconst SLIDE_COUNTS = [6, 9, 14, 12, 6, 8, 6];\nconst MODULE_LABELS = [\n  'Module 00 · Welcome to MCTS',\n  'Module 01 · Introduction to MyDoorView',\n  'Module 02 · Mastering Apps & Interfaces',\n  'Module 03 · Hardware & Installation',\n  'Module 04 · System Configuration',\n  'Module 05 · Integration Architecture',\n  'Module 06 · Troubleshooting & OBF',\n];\nlet currentIdx = 0;\nfunction getModuleForSlide(idx) {\n  if (idx === 0) return -1;\n  for (let i = MODULE_STARTS.length - 1; i >= 1; i--) {\n    if (idx >= MODULE_STARTS[i]) return i - 1;\n  }\n  return 0;\n}\nfunction goToSlide(slideId) {\n  const idx = SLIDE_IDS.indexOf(slideId);\n  if (idx !== -1) showSlide(idx);\n}\nfunction navigate(dir) {\n  const next = currentIdx + dir;\n  if (next >= 0 && next < SLIDE_IDS.length) showSlide(next);\n}\nfunction showSlide(idx) {\n  const prevId = SLIDE_IDS[currentIdx];\n  const prevWrapper = document.getElementById('wrapper-' + prevId);\n  if (prevWrapper) prevWrapper.classList.remove('active');\n  currentIdx = idx;\n  const wrapper = document.getElementById('wrapper-' + SLIDE_IDS[idx]);\n  if (wrapper) wrapper.classList.add('active');\n  updateUI(idx);\n  applyScale();\n}\nfunction updateUI(idx) {\n  const modIdx = getModuleForSlide(idx);\n  document.querySelectorAll('.nav-mod-btn').forEach((btn, i) => btn.classList.toggle('active', i === modIdx));\n  let location = 'Table of Contents';\n  if (idx > 0 && modIdx >= 0) {\n    const slideNum = idx - MODULE_STARTS[modIdx + 1] + 1;\n    location = MODULE_LABELS[modIdx] + '  ·  Slide ' + slideNum + ' of ' + SLIDE_COUNTS[modIdx];\n  }\n  document.getElementById('tb-location').textContent = location;\n  document.getElementById('tb-counter').textContent = idx + ' / ' + (SLIDE_IDS.length - 1);\n  const pct = idx === 0 ? 0 : (idx / (SLIDE_IDS.length - 1)) * 100;\n  document.getElementById('progress-fill').style.width = pct.toFixed(1) + '%';\n  document.getElementById('btn-prev').disabled = idx === 0;\n  document.getElementById('btn-next').disabled = idx === SLIDE_IDS.length - 1;\n}\nfunction applyScale() {\n  const stage = document.getElementById('stage');\n  const sw = stage.clientWidth - 40;\n  const sh = stage.clientHeight - 40;\n  const scale = Math.min(sw / 1280, sh / 720, 1);\n  document.querySelectorAll('.slide-scale-wrap').forEach(el => {\n    el.style.transform = 'scale(' + scale + ')';\n  });\n}\ndocument.addEventListener('keydown', e => {\n  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); navigate(1); }\n  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }\n  else if (e.key === 'Home') { e.preventDefault(); showSlide(0); }\n  else if (e.key === 'End') { e.preventDefault(); showSlide(SLIDE_IDS.length - 1); }\n});\nwindow.addEventListener('resize', applyScale);\ndocument.addEventListener('DOMContentLoaded', () => {\n  SLIDE_IDS.forEach(slideId => {\n    if (slideId === 'toc') return;\n    const wrapper = document.getElementById('wrapper-' + slideId);\n    const slideEl = document.getElementById(slideId);\n    if (wrapper && slideEl) {\n      const scaleWrap = document.createElement('div');\n      scaleWrap.className = 'slide-scale-wrap';\n      scaleWrap.appendChild(slideEl);\n      wrapper.appendChild(scaleWrap);\n    }\n  });\n  showSlide(0);\n});\n<\/script>\n<\/body>\n<\/html>"}];

const MOD_META=[
  {num:0,emoji:"🎓",title:"Program Overview"},
  {num:1,emoji:"🏢",title:"Intro to MyDoorView"},
  {num:2,emoji:"🖥️",title:"Apps & Interfaces"},
  {num:3,emoji:"🔧",title:"Hardware & Installation"},
  {num:4,emoji:"⚙️",title:"System Configuration"},
  {num:5,emoji:"🔗",title:"Access Control Integrations"},
  {num:6,emoji:"🛠️",title:"Troubleshooting & OBF"},
];
const LABELS=["Title", "Roadmap", "Professional Growth", "Exam Requirements", "Safety & Warranty", "Summary", "Title", "Cloud-Native Architecture", "Core Values", "Vertical Markets", "Hardware Overview", "Features & Benefits", "Software Ecosystem", "Integration Architecture", "Summary", "Title", "Platform Overview", "End-User Admin Portal", "Admin Portal Light Mode", "Admin Portal Dark Mode", "Administrator App", "Partner Portal", "Partner Portal Dashboard", "Dealer-Admin Handshake", "Remote Login Demo", "Resident App Registration", "Resident App Core Functionality", "Resident App Features", "Summary", "Title", "Physical Overview", "VUE-7 Series", "VUE-5ER", "VUE-QR", "Strategic Use Cases", "Environmental Mandates", "Power Requirements & Safety", "Wire Distance & Stability", "Rear I/O & Relay Wiring", "Booting & Licensing", "Summary", "Title", "System Scope", "Site Survey Prep", "Initial Device Setup", "Network Config", "Directory Setup", "Credential Assignment", "Access Schedules", "Remote Login Config", "User Permissions", "Testing & Verification", "Summary", "Title", "Two Lines of Sight", "Integrated Unlock Workflow", "Technical Configuration", "Integration Video Walkthroughs", "Critical Integration Wiring", "Troubleshooting & Diagnostic Logic", "Key Takeaways", "Title", "Diagnostic Workflow", "Common Hardware Issues", "Network & Cloud Failures", "OBF Process", "Summary"];
let idx=0;
const stage=document.getElementById('stage');
SLIDES.forEach((s,i)=>{
  const w=document.createElement('div');
  w.className='swrap'+(i===0?' active':'');
  const sc=document.createElement('div');
  sc.className='sscale';
  sc.innerHTML=s.html;
  w.appendChild(sc);
  stage.appendChild(w);
});
function scaleSlides(){
  const sw=stage.offsetWidth-40,sh=stage.offsetHeight-40;
  const sc=Math.min(sw/1280,sh/720);
  document.querySelectorAll('.sscale').forEach(el=>el.style.transform='scale('+sc+')');
}
window.addEventListener('resize',scaleSlides);
scaleSlides();
function updateUI(){
  const s=SLIDES[idx];
  document.querySelectorAll('.swrap').forEach((el,i)=>el.classList.toggle('active',i===idx));
  document.querySelectorAll('.vsb').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.mod)===s.modNum));
  document.getElementById('vh-ctr').textContent=(idx+1)+' / '+SLIDES.length;
  document.getElementById('vn-loc').textContent='Module '+s.modNum+': '+s.modTitle+' · Slide '+s.slideNum+' of '+s.total;
  document.getElementById('vnpf').style.width=((idx+1)/SLIDES.length*100)+'%';
  document.getElementById('btn-prev').disabled=idx===0;
  const nb=document.getElementById('btn-next');
  nb.disabled=idx===SLIDES.length-1;
  nb.textContent=idx===SLIDES.length-1?'End':'Next →';
}
function go(dir){
  const n=idx+dir;
  if(n<0||n>=SLIDES.length)return;
  idx=n;updateUI();
}
function jumpMod(m){
  const i=SLIDES.findIndex(s=>s.modNum===m);
  if(i!==-1){idx=i;updateUI();}
  closeTOC();
}
function jumpSlide(i){idx=i;updateUI();closeTOC();}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
  if(e.key==='Escape')closeTOC();
});
function openTOC(){
  let h='';
  MOD_META.forEach(m=>{
    const ms=SLIDES.map((s,i)=>Object.assign({},s,{i})).filter(s=>s.modNum===m.num);
    h+='<div class="tocms"><div class="tocmh"><span class="tocme">'+m.emoji+'</span><span class="tocmn">Module '+m.num+': '+m.title+'</span><span class="tocmc">'+ms.length+' slides</span></div><div class="tocsg">';
    ms.forEach(s=>{
      const lbl=LABELS[s.i]||'Slide '+s.slideNum;
      h+='<div class="tocsi'+(s.i===idx?' cur':'')+'" onclick="jumpSlide('+s.i+')">'+s.slideNum+'. '+lbl+'</div>';
    });
    h+='</div></div>';
  });
  document.getElementById('tocc').innerHTML=h;
  document.getElementById('toc').classList.add('open');
}
function closeTOC(){document.getElementById('toc').classList.remove('open');}
function tocBg(e){if(e.target===document.getElementById('toc'))closeTOC();}
updateUI();
</script>
