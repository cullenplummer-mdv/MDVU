<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCTS Slide Viewer — MyDoorView University</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0a1628;}
#app{display:flex;height:100vh;width:100vw;overflow:hidden;}
#sidebar{width:72px;background:#0a1628;border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;flex-shrink:0;z-index:100;}
.sidebar-logo{width:44px;height:44px;background:linear-gradient(135deg,#0077b6,#00b4d8);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px;cursor:pointer;flex-shrink:0;}
.sidebar-divider{width:32px;height:1px;background:rgba(255,255,255,0.1);margin:8px 0;}
.nav-mod-btn{width:52px;min-height:48px;background:transparent;border:1px solid transparent;border-radius:10px;color:rgba(255,255,255,0.45);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:18px;transition:all 0.2s;padding:5px 4px;}
.nav-mod-btn span{font-size:7.5px;font-weight:700;letter-spacing:0.05em;color:rgba(255,255,255,0.35);text-transform:uppercase;line-height:1;}
.nav-mod-btn:hover{background:rgba(255,255,255,0.08);color:white;border-color:rgba(255,255,255,0.12);}
.nav-mod-btn.active{background:rgba(0,119,182,0.25);border-color:rgba(0,180,216,0.4);color:white;}
.nav-mod-btn.active span{color:#7ec8e3;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#d1dce8;}
#topbar{height:48px;background:#0a1628;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.tb-title{font-size:12px;font-weight:700;color:white;letter-spacing:0.06em;text-transform:uppercase;}
.tb-sep{color:rgba(255,255,255,0.2);}
#tb-location{font-size:11px;color:rgba(255,255,255,0.5);flex:1;}
.progress-bar-wrap{width:120px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#0077b6,#00b4d8);border-radius:2px;transition:width 0.3s ease;}
#tb-counter{font-size:11px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:0.05em;}
#stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:20px;}
.slide-wrapper{display:none;position:absolute;inset:0;align-items:center;justify-content:center;}
.slide-wrapper.active{display:flex;}
.slide-scale-wrap{transform-origin:center center;}
#bottomnav{height:52px;background:#0a1628;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0;}
.nav-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:white;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.18s;letter-spacing:0.02em;}
.nav-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2);}
.nav-btn:active{transform:scale(0.97);}
.nav-btn.primary{background:linear-gradient(135deg,#005f92,#0077b6);border-color:#00a8cc;}
.nav-btn.primary:hover{background:linear-gradient(135deg,#0077b6,#00b4d8);}
.nav-btn:disabled{opacity:0.25;cursor:not-allowed;transform:none!important;}
.nav-toc-btn{background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(255,255,255,0.5);padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.18s;}
.nav-toc-btn:hover{color:white;border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.06);}
#toc-slide{width:1280px;height:720px;background:white;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 60px rgba(0,0,0,0.3);border-radius:6px;flex-shrink:0;}
.toc-accent-bar{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#0077b6,#00b4d8,#90e0ef);}
.toc-inner{padding:48px 60px 0;display:flex;flex-direction:column;height:calc(100% - 44px);gap:20px;}
.toc-header{flex-shrink:0;}
.toc-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#0096c7;margin-bottom:8px;}
.toc-h1{font-family:'DM Serif Display',serif;font-size:40px;color:#0a1628;font-weight:400;line-height:1.15;}
.toc-h1 em{font-style:italic;color:#0077b6;}
.toc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;flex:1;padding-bottom:20px;min-height:0;}
.toc-card{background:#f4f8fb;border:1.5px solid #cbd5e1;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.toc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0077b6,#00b4d8);opacity:0;transition:opacity 0.2s;}
.toc-card:hover{border-color:#7ec8e3;background:#e8f4fc;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,119,182,0.12);}
.toc-card:hover::before{opacity:1;}
.toc-emoji{font-size:28px;flex-shrink:0;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:white;border-radius:10px;border:1px solid #e2e8f0;}
.toc-content{flex:1;}
.toc-module-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#0096c7;margin-bottom:2px;}
.toc-module-title{font-size:14px;font-weight:700;color:#0f1c2e;margin-bottom:2px;}
.toc-slide-count{font-size:11px;color:#64748b;}
.toc-arrow{font-size:16px;color:#0077b6;opacity:0.5;transition:all 0.2s;font-weight:700;}
.toc-card:hover .toc-arrow{opacity:1;transform:translateX(3px);}
.toc-bottom-bar{position:absolute;bottom:0;left:0;right:0;height:44px;background:#f0f4f8;border-top:1px solid #cbd5e1;display:flex;align-items:center;padding:0 48px;justify-content:space-between;}
.toc-bottom-bar span{font-size:11px;color:#64748b;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;}
.slide{width:1280px;height:720px;background:#ffffff;position:relative;overflow:hidden;display:flex;flex-shrink:0;box-shadow:0 12px 60px rgba(0,0,0,0.15);border-radius:6px;}
.accent-bar{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#0077b6,#00b4d8,#90e0ef);z-index:10;}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:44px;background:#f0f4f8;border-top:1px solid #cbd5e1;display:flex;align-items:center;padding:0 48px;justify-content:space-between;z-index:10;}
.bottom-bar span{font-size:11px;color:#64748b;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#0096c7;margin-bottom:10px;}
.pro-tip{background:#e0f4fd;border:1px solid #7ec8e3;border-left:4px solid #0077b6;border-radius:8px;padding:14px 20px;font-size:13.5px;color:#0f3f5a;line-height:1.55;display:flex;align-items:flex-start;gap:12px;flex-shrink:0;}
.pro-tip .tip-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.pro-tip strong{color:#005885;}
.slide-inner{padding:52px 56px 0;display:flex;flex-direction:column;width:100%;height:calc(100% - 44px);gap:20px;}
.slide-header{flex-shrink:0;}
h2.slide-title{font-family:'DM Serif Display',serif;font-size:40px;color:#0a1628;font-weight:400;}
h2.slide-title em{font-style:italic;color:#0077b6;}
.module-chip{display:inline-flex;align-items:center;gap:10px;background:#e0f4fd;border:1.5px solid #7ec8e3;border-radius:100px;padding:8px 20px;font-size:13px;font-weight:700;color:#005885;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:20px;}
.module-chip .chip-dot{width:8px;height:8px;border-radius:50%;background:#0077b6;}
.hero-badge{position:relative;z-index:2;text-align:center;color:white;}
.hero-badge .badge-icon{font-size:80px;display:block;margin-bottom:20px;}
.hero-badge .badge-title{font-family:'DM Serif Display',serif;font-size:30px;line-height:1.25;margin-bottom:14px;}
.hero-badge .badge-pill{display:inline-block;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);border-radius:100px;padding:6px 18px;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;}
.stat-row{display:flex;gap:36px;}
.stat-item{display:flex;flex-direction:column;}
.stat-num{font-family:'DM Serif Display',serif;font-size:34px;color:#0077b6;line-height:1;}
.stat-label{font-size:11px;color:#64748b;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-top:4px;}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#0096c7;margin-bottom:20px;}
.takeaway-item{display:flex;gap:18px;align-items:flex-start;padding:18px 0;border-bottom:1px solid #e2e8f0;}
.takeaway-item:first-of-type{padding-top:0;}
.takeaway-item:last-child{border-bottom:none;padding-bottom:0;}
.takeaway-num{font-family:'DM Serif Display',serif;font-size:34px;color:#cbd5e1;line-height:1;flex-shrink:0;width:40px;margin-top:2px;}
.takeaway-text strong{display:block;font-size:17px;font-weight:700;color:#0f1c2e;margin-bottom:5px;}
.takeaway-text p{font-size:14px;color:#334155;line-height:1.55;}
.blue-panel{background:linear-gradient(150deg,#004e80 0%,#0077b6 45%,#00b4d8 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding-bottom:44px;}
.blue-panel::before{content:"";position:absolute;top:-80px;right:-80px;width:380px;height:380px;border-radius:50%;background:rgba(255,255,255,0.07);}
.blue-panel::after{content:"";position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;border-radius:50%;background:rgba(0,20,50,0.15);}
.panel-visual{position:relative;z-index:2;text-align:center;color:white;padding:0 44px;}
.panel-visual .big-icon{font-size:80px;display:block;margin-bottom:20px;}
.panel-visual .panel-heading{font-family:"DM Serif Display",serif;font-size:28px;margin-bottom:20px;line-height:1.3;}
.panel-visual .panel-heading em{font-style:italic;color:#90e0ef;}
.panel-tag{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;margin:4px;letter-spacing:0.03em;color:white;}
.card-base{background:#f4f8fb;border:1.5px solid #cbd5e1;border-radius:14px;position:relative;overflow:hidden;}
.card-base::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#0077b6,#00b4d8);}
.warn-card{background:#fff8e1;border:1px solid #fbbf24;border-left:4px solid #d97706;border-radius:8px;padding:13px 18px;font-size:14px;color:#78350f;line-height:1.55;display:flex;align-items:center;gap:12px;}
.warn-card strong{color:#92400e;}
.img-placeholder{background:linear-gradient(135deg,#e0f4fd 0%,#bae6fd 100%);border:2px dashed #7ec8e3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#005885;font-weight:600;font-size:13px;text-align:center;}
.img-placeholder .ph-icon{font-size:40px;}
.feature-point{display:flex;gap:16px;align-items:flex-start;}
.feature-icon{width:46px;height:46px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#005f92,#00b4d8);display:flex;align-items:center;justify-content:center;font-size:22px;}
.feature-point strong{display:block;font-size:15px;font-weight:700;color:#0f1c2e;margin-bottom:4px;}
.feature-point p{font-size:14px;color:#334155;line-height:1.55;}
.slide-label{display:none!important;}
  p strong, p em strong, li strong { display: inline !important; }
  .pro-tip strong { display: inline !important; }

/* MODULE CSS */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #d1dce8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
    gap: 48px;
    min-height: 100vh;
  }

  .slide-label {
    font-size: 12px;
    color: #64748b;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    align-self: flex-start;
    margin-left: calc(50% - 640px);
    margin-bottom: -36px;
  }

  .slide {
    width: 1280px;
    height: 720px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-shrink: 0;
    box-shadow: 0 12px 60px rgba(0,0,0,0.15);
    border-radius: 6px;
  }

  .accent-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #0077b6, #00b4d8, #90e0ef);
    z-index: 10;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 44px;
    background: #f0f4f8;
    border-top: 1px solid #cbd5e1;
    display: flex;
    align-items: center;
    padding: 0 48px;
    justify-content: space-between;
    z-index: 10;
  }
  .bottom-bar span {
    font-size: 11px;
    color: #64748b;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #0096c7;
    margin-bottom: 10px;
  }

  .pro-tip {
    background: #e0f4fd;
    border: 1px solid #7ec8e3;
    border-left: 4px solid #0077b6;
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 13.5px;
    color: #0f3f5a;
    line-height: 1.55;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }
  .pro-tip .tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .pro-tip strong { color: #005885; }

  /* ── SLIDE 1 ── */
  #m0-slide-1 { flex-direction: row; }
  #m0-slide-1 .hero-left {
    width: 54%;
    padding: 68px 52px 68px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 68px;
  }
  #m0-slide-1 .hero-right {
    width: 46%;
    background: linear-gradient(150deg, #004e80 0%, #0077b6 45%, #00b4d8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding-bottom: 44px;
  }
  #m0-slide-1 .hero-right::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  #m0-slide-1 .hero-right::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: rgba(0,20,50,0.15);
  }
  .hero-badge { position: relative; z-index: 2; text-align: center; color: white; }
  .hero-badge .badge-icon { font-size: 80px; display: block; margin-bottom: 20px; }
  .hero-badge .badge-title {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    line-height: 1.25;
    margin-bottom: 14px;
  }
  .hero-badge .badge-pill {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #m0-slide-1 h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 46px;
    color: #0a1628;
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  #m0-slide-1 h1 em { font-style: italic; color: #0077b6; }
  #m0-slide-1 .hero-sub {
    font-size: 16px;
    color: #334155;
    line-height: 1.65;
    margin-bottom: 36px;
  }
  .stat-row { display: flex; gap: 36px; }
  .stat-item { display: flex; flex-direction: column; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 34px; color: #0077b6; line-height: 1; }
  .stat-label { font-size: 11px; color: #64748b; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }

  /* ── SLIDE 2 ── */
  #m0-slide-2 { flex-direction: column; }
  #m0-slide-2 .slide-inner {
    padding: 52px 56px 0;
    display: flex;
    flex-direction: column;
    height: calc(100% - 44px);
    gap: 24px;
  }
  #m0-slide-2 .slide-header { flex-shrink: 0; }
  #m0-slide-2 h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    color: #0a1628;
    font-weight: 400;
  }
  #m0-slide-2 h2 em { font-style: italic; color: #0077b6; }
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 14px;
    flex: 1;
    min-height: 0;
    padding-bottom: 24px;
  }
  .module-card {
    background: #f4f8fb;
    border: 1.5px solid #cbd5e1;
    border-radius: 12px;
    padding: 24px 26px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .module-num-badge {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, #005f92, #00b4d8);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: white; flex-shrink: 0;
  }
  .mod-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #0096c7; margin-bottom: 4px; }
  .mod-title { font-size: 14px; font-weight: 700; color: #0f1c2e; line-height: 1.3; margin-bottom: 5px; }
  .mod-desc { font-size: 12px; color: #475569; line-height: 1.45; }

  /* ── SLIDE 3 ── */
  #m0-slide-3 { flex-direction: column; }
  #m0-slide-3 .slide-inner {
    padding: 48px 56px 0;
    display: flex;
    flex-direction: column;
    height: calc(100% - 44px);
    gap: 18px;
  }
  #m0-slide-3 .slide-header { flex-shrink: 0; }
  #m0-slide-3 h2 { font-family: 'DM Serif Display', serif; font-size: 36px; color: #0a1628; font-weight: 400; }
  #m0-slide-3 h2 em { font-style: italic; color: #0077b6; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; flex: 1; min-height: 0; }
  .benefit-group {
    background: #f4f8fb;
    border: 1.5px solid #cbd5e1;
    border-radius: 14px;
    padding: 24px 26px;
    display: flex; flex-direction: column;
    gap: 0;
    overflow: hidden;
    justify-content: space-between;
  }
  .benefit-group-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    color: #0077b6; padding-bottom: 14px; border-bottom: 1.5px solid #cbd5e1; flex-shrink: 0; margin-bottom: 4px;
  }
  .benefit-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; flex: 1; }
  .benefit-dot { width: 9px; height: 9px; border-radius: 50%; background: #00b4d8; flex-shrink: 0; margin-top: 6px; }
  .benefit-item strong { display: block; font-size: 15px; font-weight: 700; color: #0f1c2e; margin-bottom: 4px; }
  .benefit-item p { font-size: 13.5px; color: #334155; line-height: 1.5; }
  #m0-slide-3 .pro-tip { flex-shrink: 0; margin-bottom: 16px; }

  /* ── SLIDE 4 ── */
  #m0-slide-4 { flex-direction: row; }
  #m0-slide-4 .left-panel {
    width: 55%;
    padding: 56px 44px 56px 56px;
    display: flex; flex-direction: column; justify-content: center;
    padding-bottom: calc(44px + 12px);
  }
  #m0-slide-4 h2 { font-family: 'DM Serif Display', serif; font-size: 36px; color: #0a1628; font-weight: 400; margin-bottom: 28px; }
  #m0-slide-4 h2 em { font-style: italic; color: #0077b6; }
  .req-list { display: flex; flex-direction: column; }
  .req-item { display: flex; gap: 16px; align-items: flex-start; padding: 18px 0; border-bottom: 1px solid #e2e8f0; }

  /* ══ SLIDE 1 — HERO ══ */

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background:#ccd6e0;display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:52px}
.lbl{font-size:11px;color:#64748b;font-weight:600;letter-spacing:.09em;text-transform:uppercase;align-self:flex-start;margin-left:calc(50% - 640px);margin-bottom:-38px}
.slide{width:1280px;height:720px;background:#fff;position:relative;overflow:hidden;display:flex;flex-shrink:0;box-shadow:0 14px 64px rgba(0,0,0,.16);border-radius:6px}
.bar{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#0077b6,#00b4d8,#90e0ef);z-index:10}
.foot{position:absolute;bottom:0;left:0;right:0;height:44px;background:#f0f4f8;border-top:1px solid #cbd5e1;display:flex;align-items:center;padding:0 48px;justify-content:space-between;z-index:10}
.foot span{font-size:11px;color:#64748b;font-weight:600;letter-spacing:.07em;text-transform:uppercase}

/* BLUE PANEL — padding-top:5px accounts for accent bar; padding-bottom:44px for footer */
.blue{background:linear-gradient(150deg,#003f6b 0%,#0077b6 50%,#00a8cc 100%);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding-top:5px;padding-bottom:44px}
.blue::before{content:"";position:absolute;top:-80px;right:-80px;width:380px;height:380px;border-radius:50%;background:rgba(255,255,255,.07)}
.blue::after{content:"";position:absolute;bottom:-60px;left:-60px;width:270px;height:270px;border-radius:50%;background:rgba(0,15,40,.18)}
.bi{position:relative;z-index:2;text-align:center;color:#fff;padding:0 32px;width:100%}
.bi .ico{font-size:64px;display:block;margin-bottom:12px}
.bi .ttl{font-family:"DM Serif Display",serif;font-size:26px;line-height:1.3;margin-bottom:14px}
.bi .ttl em{font-style:italic;color:#90e0ef}
.chip{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;margin:4px;color:#fff}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#0096c7;margin-bottom:7px}
.sh{font-family:"DM Serif Display",serif;font-size:34px;color:#0a1628;font-weight:400;line-height:1.1;margin-bottom:14px}
.sh em{font-style:italic;color:#0077b6}
.mchip{display:inline-flex;align-items:center;gap:9px;background:#e0f4fd;border:1.5px solid #7ec8e3;border-radius:100px;padding:7px 20px;font-size:12px;font-weight:700;color:#005885;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.mchip .dot{width:7px;height:7px;border-radius:50%;background:#0077b6}

/* STEP ROWS */
.steps{display:flex;flex-direction:column;gap:9px}
.step{display:flex;align-items:center;gap:13px;background:#f4f8fb;border:1.5px solid #dde6ef;border-radius:10px;padding:12px 16px}
.sn{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,#005f92,#00b4d8);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.step p{font-size:14px;color:#1e3a52;line-height:1.35;flex:1}

<script>
const SLIDES = [{"id": "m0-slide-1", "modNum": 0, "modTitle": "Program Overview", "modEmoji": "🎓", "slideNum": 1, "total": 6, "html": "<div class=\"slide\" id=\"m0-slide-1\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"hero-left\">\n    <div class=\"eyebrow\">MCTS Certification Program<\/div>\n    <h1>Welcome to the<br>MyDoorView <em>Technical<\/em><br>Certification Program<\/h1>\n    <p class=\"hero-sub\">Learn how to confidently sell, deploy, and support MyDoorView through clear instruction, proven best practices, and dealer-focused resources.<\/p>\n    <div class=\"stat-row\">\n      <div class=\"stat-item\"><span class=\"stat-num\">6<\/span><span class=\"stat-label\">Modules<\/span><\/div>\n      <div class=\"stat-item\"><span class=\"stat-num\">80%<\/span><span class=\"stat-label\">Passing Score<\/span><\/div>\n      <div class=\"stat-item\"><span class=\"stat-num\">MCTS<\/span><span class=\"stat-label\">Designation<\/span><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"hero-right\">\n    <div class=\"hero-badge\">\n      <span class=\"badge-icon\">🏆<\/span>\n      <div class=\"badge-title\">MyDoorView Certified<br>Technical Specialist<\/div>\n      <div class=\"badge-pill\">MCTS · Self-Paced<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 00 · Welcome<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 2 — ROADMAP -->"}, {"id": "m0-slide-2", "modNum": 0, "modTitle": "Program Overview", "modEmoji": "🎓", "slideNum": 2, "total": 6, "html": "<div class=\"slide\" id=\"m0-slide-2\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Program Overview<\/div>\n      <h2>Your <em>Roadmap<\/em> to Certification<\/h2>\n    <\/div>\n    <div class=\"modules-grid\">\n      <div class=\"module-card\">\n        <div class=\"module-num-badge\">1<\/div>\n        <div><div class=\"mod-label\">Module 01<\/div><div class=\"mod-title\">Introduction to MyDoorView<\/div><div class=\"mod-desc\">Cloud-native architecture, hardware portfolio & integration ecosystem<\/div><\/div>\n      <\/div>\n      <div class=\"module-card\">\n        <div class=\"module-num-badge\">2<\/div>\n        <div><div class=\"mod-label\">Module 02<\/div><div class=\"mod-title\">Mastering Apps & Interfaces<\/div><div class=\"mod-desc\">Resident App, Admin Portal, Dealer Portal & Remote Login workflows<\/div><\/div>\n      <\/div>\n      <div class=\"module-card\">\n        <div class=\"module-num-badge\">3<\/div>\n        <div><div class=\"mod-label\">Module 03<\/div><div class=\"mod-title\">Hardware & Installation<\/div><div class=\"mod-desc\">VUE-7R, VUE-5ER specs, mounting standards & I/O wiring<\/div><\/div>\n      <\/div>\n      <div class=\"module-card\">\n        <div class=\"module-num-badge\">4<\/div>\n        <div><div class=\"mod-label\">Module 04<\/div><div class=\"mod-title\">System Configuration & Setup<\/div><div class=\"mod-desc\">Licensing, property hierarchy, relay programming & device bonding<\/div><\/div>\n      <\/div>\n      <div class=\"module-card\">\n        <div class=\"module-num-badge\">5<\/div>\n        <div><div class=\"mod-label\">Module 05<\/div><div class=\"mod-title\">Integration Architecture<\/div><div class=\"mod-desc\">Cloud-to-Cloud API, Brivo/PDK/Kantech workflows & diagnostics<\/div><\/div>\n      <\/div>\n      <div class=\"module-card\">\n        <div class=\"module-num-badge\">6<\/div>\n        <div><div class=\"mod-label\">Module 06<\/div><div class=\"mod-title\">Troubleshooting & OBF Protocol<\/div><div class=\"mod-desc\">Diagnostic logic, network vs. hardware failures & panel swaps<\/div><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 00 · Welcome<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 3 — PROFESSIONAL GROWTH -->"}, {"id": "m0-slide-3", "modNum": 0, "modTitle": "Program Overview", "modEmoji": "🎓", "slideNum": 3, "total": 6, "html": "<div class=\"slide\" id=\"m0-slide-3\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Why It Matters<\/div>\n      <h2>Professional Growth &amp; <em>Technical Excellence<\/em><\/h2>\n    <\/div>\n    <div class=\"two-col\">\n      <div class=\"benefit-group\">\n        <div class=\"benefit-group-title\">Certification Value<\/div>\n        <div class=\"benefit-item\"><div class=\"benefit-dot\"><\/div><div><strong>Validation of Expertise<\/strong><p>Certification validates your technical skills and elevates your standing within the MyDoorView ecosystem.<\/p><\/div><\/div>\n        <div class=\"benefit-item\"><div class=\"benefit-dot\"><\/div><div><strong>Professional Credibility<\/strong><p>Distinguish your service offering with a manufacturer-validated standard of work in a competitive market.<\/p><\/div><\/div>\n        <div class=\"benefit-item\"><div class=\"benefit-dot\"><\/div><div><strong>Operational Efficiency<\/strong><p>Proficiency leads to fewer installation errors and faster system setup — saving time on every job.<\/p><\/div><\/div>\n      <\/div>\n      <div class=\"benefit-group\">\n        <div class=\"benefit-group-title\">Business Benefits<\/div>\n        <div class=\"benefit-item\"><div class=\"benefit-dot\"><\/div><div><strong>Priority Support Access<\/strong><p>Certified technicians gain eligibility for priority technical support from the MDV team.<\/p><\/div><\/div>\n        <div class=\"benefit-item\"><div class=\"benefit-dot\"><\/div><div><strong>Advanced Dealer Tiers<\/strong><p>MCTS status is a prerequisite for reaching higher levels within the MyDoorView partner program.<\/p><\/div><\/div>\n        <div class=\"benefit-item\"><div class=\"benefit-dot\"><\/div><div><strong>Reduced Support Burden<\/strong><p>Faster setups and deeper hardware knowledge significantly reduce troubleshooting time per install.<\/p><\/div><\/div>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">💡<\/span>\n      <span><strong>Pro Tip:<\/strong> The goal of this program is to help you achieve \"First-Time Right\" installations — minimizing the need for return trips to the site.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 00 · Welcome<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 4 — EXAM SUCCESS -->"}, {"id": "m0-slide-4", "modNum": 0, "modTitle": "Program Overview", "modEmoji": "🎓", "slideNum": 4, "total": 6, "html": "<div class=\"slide\" id=\"m0-slide-4\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-panel\">\n    <div class=\"eyebrow\">Testing Strategy<\/div>\n    <h2>Exam Success <em>Requirements<\/em><\/h2>\n    <div class=\"req-list\">\n      <div class=\"req-item\"><div class=\"req-icon\">🎯<\/div><div class=\"req-text\"><strong>Passing Score<\/strong><p>A minimum score of 80% is required on the Final Exam to receive MCTS certification.<\/p><\/div><\/div>\n      <div class=\"req-item\"><div class=\"req-icon\">📋<\/div><div class=\"req-text\"><strong>Exam Format<\/strong><p>Multiple choice questions covering hardware, software logic, and system integrations.<\/p><\/div><\/div>\n      <div class=\"req-item\"><div class=\"req-icon\">💻<\/div><div class=\"req-text\"><strong>Recommended Setup<\/strong><p>Use a desktop or laptop computer for the best learning and exam experience.<\/p><\/div><\/div>\n      <div class=\"req-item\"><div class=\"req-icon\">📌<\/div><div class=\"req-text\"><strong>Study Strategy<\/strong><p>Pay close attention to highlighted Pro-Tips and troubleshooting notes throughout the course.<\/p><\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-panel\">\n    <div class=\"score-card\">\n      <div class=\"score-label\">Passing Threshold<\/div>\n      <div class=\"score-num\">80<\/div>\n      <div class=\"score-pct\">% Required<\/div>\n      <div class=\"score-sub\">40 out of 50 questions correct<br>to earn your MCTS designation<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 00 · Welcome<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 5 — SAFETY & WARRANTY -->"}, {"id": "m0-slide-5", "modNum": 0, "modTitle": "Program Overview", "modEmoji": "🎓", "slideNum": 5, "total": 6, "html": "<div class=\"slide\" id=\"m0-slide-5\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Critical Requirements<\/div>\n      <h2>Safety &amp; <em>Warranty<\/em> — Mandatory Reading<\/h2>\n    <\/div>\n    <div class=\"warning-banner\">\n      <span class=\"warn-icon\">⚠️<\/span>\n      <span><strong>Important:<\/strong> Failure to follow these guidelines will void the product warranty and may result in removal from the dealer program.<\/span>\n    <\/div>\n    <div class=\"rules-grid\">\n      <div class=\"rule-card\">\n        <div class=\"rule-icon-wrap\">🔒<\/div>\n        <h4>Authorized Service Only<\/h4>\n        <p>Do not attempt to field service the unit unless specifically directed by MyDoorView technical support.<\/p>\n      <\/div>\n      <div class=\"rule-card\">\n        <div class=\"rule-icon-wrap\">📜<\/div>\n        <h4>The Warranty Rule<\/h4>\n        <p>Any unauthorized service — including opening the back panel — will void the product warranty immediately.<\/p>\n      <\/div>\n      <div class=\"rule-card\">\n        <div class=\"rule-icon-wrap\">📖<\/div>\n        <h4>Read Before Installing<\/h4>\n        <p>Read all manufacturer safety and operating instructions before beginning any installation work.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">📞<\/span>\n      <span><strong>Pro Tip:<\/strong> If you encounter a potential hardware fault like a blown fuse — stop. Contact Technical Support at <strong>888-575-6891 ext. 103<\/strong> before proceeding.<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 00 · Welcome<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 6 — SUMMARY -->"}, {"id": "m0-slide-6", "modNum": 0, "modTitle": "Program Overview", "modEmoji": "🎓", "slideNum": 6, "total": 6, "html": "<div class=\"slide\" id=\"m0-slide-6\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-panel\">\n    <div class=\"eyebrow\">Module 00 Complete<\/div>\n    <h2>Module<br>Summary<\/h2>\n    <p>You're ready to begin the certification journey. The next module covers the MyDoorView platform, architecture, and hardware portfolio.<\/p>\n  <\/div>\n  <div class=\"right-panel\">\n    <div class=\"section-label\">Key Takeaways<\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">01<\/div><div class=\"takeaway-text\"><strong>Certification Drives Growth<\/strong><p>MCTS is a proven driver for sales growth, technical efficiency, and partner tier advancement.<\/p><\/div><\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">02<\/div><div class=\"takeaway-text\"><strong>80% to Pass<\/strong><p>A minimum score of 80% is required on the Final Exam to earn your MCTS designation.<\/p><\/div><\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">03<\/div><div class=\"takeaway-text\"><strong>Warranty Protection<\/strong><p>Unauthorized field service voids the product warranty — always call support first.<\/p><\/div><\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">04<\/div><div class=\"takeaway-text\"><strong>Hardware + Software Mastery<\/strong><p>Success depends on understanding both physical hardware and cloud-native software logic.<\/p><\/div><\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 00 · Welcome<\/span>\n  <\/div>\n<\/div>"}, {"id": "m1-slide-1", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 1, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-1\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"hero-left\">\n    <div class=\"module-chip\"><span class=\"chip-dot\"><\/span>Module 01<\/div>\n    <h1><em>Introduction<\/em> to<br>MyDoorView<\/h1>\n    <p class=\"hero-sub\">In this module, we establish the foundation of the MyDoorView ecosystem — mission, architecture, hardware, software, and integrations.<\/p>\n  <\/div>\n  <div class=\"hero-right\">\n    <div class=\"hero-badge\">\n      <span class=\"badge-icon\">🏢<\/span>\n      <div class=\"badge-title\">The MyDoorView<br>Ecosystem<\/div>\n      <div class=\"badge-pill\">Cloud-Native Platform<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 2 — CLOUD NATIVE -->"}, {"id": "m1-slide-2", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 2, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-2\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">Platform Architecture<\/div>\n    <h2>The <em>Cloud-Native<\/em> Revolution<\/h2>\n    <div class=\"cloud-points\">\n      <div class=\"cloud-point\">\n        <div class=\"cloud-point-icon\">🎯<\/div>\n        <div><strong>MDV Mission<\/strong><p>To provide cloud-based video intercom and access control solutions for residential and commercial properties worldwide.<\/p><\/div>\n      <\/div>\n      <div class=\"cloud-point\">\n        <div class=\"cloud-point-icon\">☁️<\/div>\n        <div><strong>No Local Infrastructure Required<\/strong><p>All access events, permissions, and streaming are managed via the MyDoorView cloud — no on-site servers needed.<\/p><\/div>\n      <\/div>\n      <div class=\"cloud-point\">\n        <div class=\"cloud-point-icon\">🔗<\/div>\n        <div><strong>Core Capabilities<\/strong><p>Secure access control, real-time video monitoring, remote management, and deep integration with third-party systems.<\/p><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"cloud-visual\">\n      <span class=\"big-icon\">☁️<\/span>\n      <div class=\"cloud-heading\">Everything runs<br><em>in the cloud<\/em><\/div>\n      <div>\n        <span class=\"cloud-tag\">Real-Time Monitoring<\/span>\n        <span class=\"cloud-tag\">Remote Management<\/span>\n        <span class=\"cloud-tag\">Video Streaming<\/span>\n        <span class=\"cloud-tag\">Access Control<\/span>\n        <span class=\"cloud-tag\">Third-Party Integrations<\/span>\n        <span class=\"cloud-tag\">No Local Servers<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 3 — CORE VALUES -->"}, {"id": "m1-slide-3", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 3, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-3\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\"><div class=\"eyebrow\">Who We Are<\/div><h2 class=\"slide-title\">MyDoorView <em>Core Values<\/em><\/h2><\/div>\n    <div class=\"values-grid\">\n      <div class=\"value-card\"><div class=\"value-icon\">🤝<\/div><div class=\"value-title\">Customer First<\/div><div class=\"value-body\">We are committed to the success and satisfaction of our customers and partners above all else.<\/div><\/div>\n      <div class=\"value-card\"><div class=\"value-icon\">⚖️<\/div><div class=\"value-title\">Integrity &amp; Trust<\/div><div class=\"value-body\">Trust is the foundation of our relationships. We operate with transparency, honesty, and accountability.<\/div><\/div>\n      <div class=\"value-card\"><div class=\"value-icon\">🏆<\/div><div class=\"value-title\">Commitment to Excellence<\/div><div class=\"value-body\">From product design to customer support, we are dedicated to excellence in every aspect of our business.<\/div><\/div>\n      <div class=\"value-card\" style=\"grid-column:1/2;\"><div class=\"value-icon\">🔐<\/div><div class=\"value-title\">Security-Driven<\/div><div class=\"value-body\">Security is more than a feature — it is a responsibility we take seriously across every product and interaction.<\/div><\/div>\n      <div class=\"value-card\" style=\"grid-column:2/3;\"><div class=\"value-icon\">🌐<\/div><div class=\"value-title\">Partnership Focused<\/div><div class=\"value-body\">We believe success is built through strong partnerships. We empower our dealers, resellers, and technology partners.<\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 4 — VERTICAL MARKETS -->"}, {"id": "m1-slide-4", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 4, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-4\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\"><div class=\"eyebrow\">Who We Serve<\/div><h2 class=\"slide-title\">We Make Life Easier for <em>All Vertical Markets<\/em><\/h2><\/div>\n    <div class=\"markets-grid\">\n      <div class=\"market-card\">\n        <div class=\"market-card-top\"><span class=\"market-emoji\">🏢<\/span><\/div>\n        <div class=\"market-card-bottom\"><div class=\"market-name\">Commercial<\/div><div class=\"market-desc\">Office buildings, retail, and multi-tenant commercial spaces with visitor management needs.<\/div><\/div>\n      <\/div>\n      <div class=\"market-card\">\n        <div class=\"market-card-top\"><span class=\"market-emoji\">🏠<\/span><\/div>\n        <div class=\"market-card-bottom\"><div class=\"market-name\">Residential<\/div><div class=\"market-desc\">Apartment complexes, condos, and gated communities requiring resident directory and remote access.<\/div><\/div>\n      <\/div>\n      <div class=\"market-card\">\n        <div class=\"market-card-top\"><span class=\"market-emoji\">🎓<\/span><\/div>\n        <div class=\"market-card-bottom\"><div class=\"market-name\">Education<\/div><div class=\"market-desc\">Schools and universities needing secure, controllable access across multiple entry points.<\/div><\/div>\n      <\/div>\n      <div class=\"market-card\">\n        <div class=\"market-card-top\"><span class=\"market-emoji\">⛪<\/span><\/div>\n        <div class=\"market-card-bottom\"><div class=\"market-name\">Houses of Worship<\/div><div class=\"market-desc\">Faith communities managing visitor access, event entry, and staff credentials.<\/div><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 5 — HARDWARE OVERVIEW (real product photos) -->"}, {"id": "m1-slide-5", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 5, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-5\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\"><div class=\"eyebrow\">Product Portfolio<\/div><h2 class=\"slide-title\">Hardware <em>Overview<\/em><\/h2><\/div>\n    <div class=\"hardware-grid\">\n      <div class=\"hw-card\">\n        <div class=\"hw-card-image\"><<img \n  src=\"data:image/svg+xml;utf8,\n  <svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'>\n    <rect width='100%' height='100%' fill='%23f3f4f6'/>\n    <text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle'\n      font-family='Arial' font-size='20' fill='%239ca3af'>\n      VUE-7R IMAGE\n    <\/text>\n  <\/svg>\" \n  alt=\"VUE-7R Panel\"><\/div>\n        <div class=\"hw-card-body\">\n          <div class=\"hw-badge\">VUE-7R<\/div>\n          <div class=\"hw-title\">Flagship Panel<\/div>\n          <div class=\"hw-subtitle\">7\" Touchscreen · Main Lobby Intercom<\/div>\n          <div class=\"hw-desc\">The go-to solution for main building entrances and multi-tenant lobbies with large resident directories.<\/div>\n          <div class=\"hw-specs\"><span class=\"hw-spec\">7\" Display<\/span><span class=\"hw-spec\">PoE+ or 12V DC<\/span><span class=\"hw-spec\">IP65 Rated<\/span><span class=\"hw-spec\">2 Relays<\/span><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"hw-card\">\n        <div class=\"hw-card-image\"><img \n  src=\"data:image/svg+xml;utf8,\n  <svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'>\n    <rect width='100%' height='100%' fill='%23f3f4f6'/>\n    <text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle'\n      font-family='Arial' font-size='20' fill='%239ca3af'>\n      VUE-5ER IMAGE\n    <\/text>\n  <\/svg>\" \n  alt=\"VUE-5ER Panel\"><\/div>\n        <div class=\"hw-card-body\">\n          <div class=\"hw-badge\">VUE 5-ER<\/div>\n          <div class=\"hw-title\">Slim Mullion Panel<\/div>\n          <div class=\"hw-subtitle\">2.13\" Wide · Retrofit Ready<\/div>\n          <div class=\"hw-desc\">Specifically engineered for narrow door frames and retrofit installations on commercial storefronts.<\/div>\n          <div class=\"hw-specs\"><span class=\"hw-spec\">2.13\" Wide<\/span><span class=\"hw-spec\">Mullion Mount<\/span><span class=\"hw-spec\">Retrofit Ready<\/span><\/div>\n        <\/div>\n      <\/div>\n      <div class=\"hw-card\">\n        <div class=\"hw-card-image\"><img \n  src=\"data:image/svg+xml;utf8,\n  <svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'>\n    <rect width='100%' height='100%' fill='%23f3f4f6'/>\n    <text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle'\n      font-family='Arial' font-size='20' fill='%239ca3af'>\n      VUE-QR Code IMAGE\n    <\/text>\n  <\/svg>\" \n  alt=\"VUE-QR Code\"><\/div>\n        <div class=\"hw-card-body\">\n          <div class=\"hw-badge\">VUE-QR<\/div>\n          <div class=\"hw-title\">QR Placard<\/div>\n          <div class=\"hw-subtitle\">No Power · No Wiring Required<\/div>\n          <div class=\"hw-desc\">A non-electronic sticker solution. Residents scan the QR code to trigger a cloud-based access event.<\/div>\n          <div class=\"hw-specs\"><span class=\"hw-spec\">No Wiring<\/span><span class=\"hw-spec\">No Power<\/span><span class=\"hw-spec\">Cloud-Based<\/span><\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 6 — FEATURES & BENEFITS -->"}, {"id": "m1-slide-6", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 6, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-6\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">Sales Support<\/div>\n    <h2>A Growing List of <em>Features &amp; Benefits<\/em><\/h2>\n    <p class=\"lead\">MyDoorView actively supports your deals — we help you demo, close, and win.<\/p>\n    <div class=\"support-cards\">\n      <div class=\"support-card\"><span class=\"s-icon\">🎬<\/span><div><strong>We Do the Demo<\/strong><p>MyDoorView will run product demonstrations for your customers so you can focus on the relationship.<\/p><\/div><\/div>\n      <div class=\"support-card\"><span class=\"s-icon\">🤝<\/span><div><strong>We Help Close the Deal<\/strong><p>Our team actively assists in closing sales opportunities alongside certified dealer partners.<\/p><\/div><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"features-col-wrap\">\n      <div class=\"feature-group\">\n        <div class=\"feature-group-title\">Core Access Control<\/div>\n        <div class=\"feature-item\">Multiple entry points per app<\/div>\n        <div class=\"feature-item\">Swipe-to-open via mobile<\/div>\n        <div class=\"feature-item\">Calling groups &amp; rollover<\/div>\n        <div class=\"feature-item\">Floor-by-floor elevator control<\/div>\n        <div class=\"feature-item\">Voice-only access (*9 feature)<\/div>\n      <\/div>\n      <div class=\"feature-group\">\n        <div class=\"feature-group-title\">Guest &amp; Delivery Access<\/div>\n        <div class=\"feature-item\">QR code virtual guest entry<\/div>\n        <div class=\"feature-item\">Guest PINs for scheduled visitors<\/div>\n        <div class=\"feature-item\">Delivery PINs for couriers<\/div>\n        <div class=\"feature-group-title\" style=\"margin-top:18px\">User Experience<\/div>\n        <div class=\"feature-item\">Do Not Disturb mode<\/div>\n        <div class=\"feature-item\">Option to hide from directory<\/div>\n        <div class=\"feature-item\">Calls to management portal<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 7 — SOFTWARE ECOSYSTEM -->"}, {"id": "m1-slide-7", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 7, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-7\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\"><div class=\"eyebrow\">Platform Software<\/div><h2 class=\"slide-title\">The <em>Software Ecosystem<\/em><\/h2><\/div>\n    <div class=\"software-grid\">\n      <div class=\"sw-card dealer\">\n        <div class=\"sw-icon-wrap\">🛠️<\/div>\n        <div class=\"sw-card-role\">For Technicians &amp; Dealers<\/div>\n        <div class=\"sw-card-title\">Dealer Portal<\/div>\n        <div class=\"sw-card-desc\">The primary hub for technicians to create new client accounts, manage existing clients, access technical documentation, and initiate Remote Login for system configuration.<\/div>\n        <div class=\"sw-card-tags\"><span class=\"sw-tag\">Account Creation<\/span><span class=\"sw-tag\">Remote Login<\/span><span class=\"sw-tag\">Documentation<\/span><span class=\"sw-tag\">Client Management<\/span><\/div>\n      <\/div>\n      <div class=\"sw-card admin\">\n        <div class=\"sw-icon-wrap\">⚙️<\/div>\n        <div class=\"sw-card-role\">For Property Managers<\/div>\n        <div class=\"sw-card-title\">Admin Portal<\/div>\n        <div class=\"sw-card-desc\">The daily operations hub used by property managers for directory management, resident user setup, credential assignment, and monitoring access events.<\/div>\n        <div class=\"sw-card-tags\"><span class=\"sw-tag\">Directory Management<\/span><span class=\"sw-tag\">User Setup<\/span><span class=\"sw-tag\">Event Logs<\/span><span class=\"sw-tag\">Credentials<\/span><\/div>\n      <\/div>\n      <div class=\"sw-card resident\">\n        <div class=\"sw-icon-wrap\">📱<\/div>\n        <div class=\"sw-card-role\">For Residents &amp; End Users<\/div>\n        <div class=\"sw-card-title\">Resident App<\/div>\n        <div class=\"sw-card-desc\">The end-user interface for remote door unlocking, receiving live video and audio calls from visitors at the panel, and managing Guest PINs for visitor access.<\/div>\n        <div class=\"sw-card-tags\"><span class=\"sw-tag\">Remote Unlock<\/span><span class=\"sw-tag\">Video Calls<\/span><span class=\"sw-tag\">Guest PINs<\/span><span class=\"sw-tag\">Notifications<\/span><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 8 — INTEGRATION ARCHITECTURE -->"}, {"id": "m1-slide-8", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 8, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-8\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\"><div class=\"eyebrow\">Cloud-to-Cloud API<\/div><h2 class=\"slide-title\">Integration <em>Architecture<\/em> — Expanding the Cloud<\/h2><\/div>\n    <div class=\"integration-partners\">\n      <span class=\"partner-label\">Partners:<\/span>\n      <div class=\"partner-pill\"><span class=\"partner-dot\"><\/span>Brivo<\/div>\n      <div class=\"partner-pill\"><span class=\"partner-dot\"><\/span>PDK (ProDataKey)<\/div>\n      <div class=\"partner-pill\"><span class=\"partner-dot\"><\/span>Kantech<\/div>\n    <\/div>\n    <div class=\"api-flow\">\n      <div class=\"flow-step highlight\">\n        <div class=\"flow-step-header\"><div class=\"flow-num\">1<\/div><div class=\"flow-icon\">👤<\/div><\/div>\n        <div class=\"flow-title\">Resident Action<\/div>\n        <div class=\"flow-desc\">Resident taps \"Unlock\" in the MDV app or presents a credential at the VUE panel.<\/div>\n      <\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-step\">\n        <div class=\"flow-step-header\"><div class=\"flow-num\">2<\/div><div class=\"flow-icon\">📟<\/div><\/div>\n        <div class=\"flow-title\">MDV Panel<\/div>\n        <div class=\"flow-desc\">VUE panel captures the event and sends the request to the MyDoorView Cloud.<\/div>\n      <\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-step highlight\">\n        <div class=\"flow-step-header\"><div class=\"flow-num\">3<\/div><div class=\"flow-icon\">☁️<\/div><\/div>\n        <div class=\"flow-title\">MDV Cloud<\/div>\n        <div class=\"flow-desc\">The MDV Cloud receives the request and forwards it to the partner ACS via Cloud-to-Cloud API.<\/div>\n      <\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-step\">\n        <div class=\"flow-step-header\"><div class=\"flow-num\">4<\/div><div class=\"flow-icon\">🔑<\/div><\/div>\n        <div class=\"flow-title\">Partner Validates<\/div>\n        <div class=\"flow-desc\">The partner ACS (Brivo, PDK, or Kantech) validates the credential and permissions in its database.<\/div>\n      <\/div>\n      <div class=\"flow-arrow\">→<\/div>\n      <div class=\"flow-step highlight\">\n        <div class=\"flow-step-header\"><div class=\"flow-num\">5<\/div><div class=\"flow-icon\">🚪<\/div><\/div>\n        <div class=\"flow-title\">Door Fires<\/div>\n        <div class=\"flow-desc\">The partner local controller fires the relay — unlocking the door. MDV is the video front-end only.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>\n\n<!-- SLIDE 9 — SUMMARY -->"}, {"id": "m1-slide-9", "modNum": 1, "modTitle": "Intro to MyDoorView", "modEmoji": "🏢", "slideNum": 9, "total": 9, "html": "<div class=\"slide\" id=\"m1-slide-9\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-panel\">\n    <div class=\"eyebrow\">Module 01 Complete<\/div>\n    <h2>Module<br>Summary<\/h2>\n    <p>You now understand the MyDoorView ecosystem — its architecture, hardware, software, and integration capabilities.<\/p>\n  <\/div>\n  <div class=\"right-panel\">\n    <div class=\"section-label\">Key Takeaways<\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">01<\/div><div class=\"takeaway-text\"><strong>Cloud-Native Architecture<\/strong><p>MDV eliminates the need for local servers — all events, permissions, and streaming are cloud-managed.<\/p><\/div><\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">02<\/div><div class=\"takeaway-text\"><strong>Core Features<\/strong><p>Guest Passes, Swipe-to-Unlock, Call Groups, and elevator control are central to the MDV value proposition.<\/p><\/div><\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">03<\/div><div class=\"takeaway-text\"><strong>Hardware Variety<\/strong><p>Options range from the flagship VUE-7R to the slim VUE 5-ER and the wire-free VUE-QR placard.<\/p><\/div><\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">04<\/div><div class=\"takeaway-text\"><strong>API Integration Power<\/strong><p>Integrations with Brivo, PDK, and Kantech allow the partner ACS to control the relay via Cloud-to-Cloud API.<\/p><\/div><\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 01 · Introduction to MyDoorView<\/span>\n  <\/div>\n<\/div>"}, {"id": "m2-slide-1", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 1, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-1\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"hero-left\">\n    <div class=\"module-chip\"><span class=\"chip-dot\"><\/span>Module 02<\/div>\n    <h1><em>Mastering<\/em> Apps<br>&amp; Interfaces<\/h1>\n    <p class=\"hero-sub\">In this module, we will cover the different MyDoorView portals and their specific use cases — from the Dealer Partner Portal to the Resident App.<\/p>\n  <\/div>\n  <div class=\"hero-right blue-panel\">\n    <div class=\"hero-badge\">\n      <span class=\"badge-icon\">📱<\/span>\n      <div class=\"badge-title\">Apps &amp; Portals<\/div>\n      <span class=\"badge-pill\">MCTS Certification<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 02 · Mastering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 2 — PORTALS OVERVIEW ═══════════════════════════════ -->"}, {"id": "m2-slide-2", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 2, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-2\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Platform Overview<\/div>\n      <h2>The MyDoorView <em>Apps and Portals<\/em><\/h2>\n    <\/div>\n    <div class=\"portals-grid\">\n      <div class=\"portal-card card-base\">\n        <div class=\"card-icon\">🏢<\/div>\n        <div class=\"card-tag\">For Dealers<\/div>\n        <h3>Dealer Portal<\/h3>\n        <ul>\n          <li>Create customer accounts<\/li>\n          <li>View and download sales and technical documentation<\/li>\n          <li>Remote login for system configuration<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"portal-card card-base\">\n        <div class=\"card-icon\">🏠<\/div>\n        <div class=\"card-tag\">For Residents<\/div>\n        <h3>Resident App<\/h3>\n        <ul>\n          <li>Issue guest PINs<\/li>\n          <li>Create and edit calling groups<\/li>\n          <li>Set Do Not Disturb schedule<\/li>\n          <li>And more…<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"portal-card card-base\">\n        <div class=\"card-icon\">⚙️<\/div>\n        <div class=\"card-tag\">For Property Administrators<\/div>\n        <h3>End-User Admin Portal<\/h3>\n        <ul>\n          <li>View event log and history<\/li>\n          <li>Add users, credentials, groups, and more<\/li>\n        <\/ul>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 02 · Mastering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 3 — END-USER ADMIN PORTAL ═══════════════════════════════ -->"}, {"id": "m2-slide-3", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 3, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-3\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">Admi ering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 9 — DEALER-ADMIN HANDSHAKE ═══════════════════════════════ -->"}, {"id": "m2-slide-9", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 9, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-9\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col\">\n    <div class=\"eyebrow\">Workflow<\/div>\n    <h2>The Dealer-Admin<br>Remote <em>'Handshake'<\/em><\/h2>\n    <div class=\"step-point\">\n      <div class=\"step-num-badge\">1<\/div>\n      <div>\n        <strong>Dealer Portal<\/strong>\n        <p>Create the property profile and client account. Initiate a secure link (Remote Login) from the Dealer Portal into the specific Property Admin Portal.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"step-point\">\n      <div class=\"step-num-badge\">2<\/div>\n      <div>\n        <strong>Property Admin Portal<\/strong>\n        <p>Elevated view unlocks \"Dealer Admin\" menus hidden from standard users. Used for hardware settings, device changes, and linking serial numbers.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"pro-tip\">\n      <span class=\"tip-icon\">💡<\/span>\n      <div><strong>Pro-Tip:<\/strong> The <strong>Dealer Portal<\/strong> is for creating a customer account. The <strong>Remote Login to the Admin Portal<\/strong> is where technical heavy lifting and device provisioning occur.<\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col blue-panel\">\n    <div class=\"hs-panel-inner\">\n      <div class=\"hs-step\">\n        <div class=\"step-label\">Step 1 · Dealer Portal<\/div>\n        <h4>Create Account<\/h4>\n        <p>Set up property profile and generate client account credentials.<\/p>\n      <\/div>\n      <div class=\"hs-arrow\">↓<\/div>\n      <div class=\"hs-step\">\n        <div class=\"step-label\">The Handshake<\/div>\n        <h4>🤝 Remote Login<\/h4>\n        <p>Secure link from Dealer Portal directly into the Property Admin Portal.<\/p>\n      <\/div>\n      <div class=\"hs-arrow\">↓<\/div>\n      <div class=\"hs-step\">\n        <div class=\"step-label\">Step 2 · Admin Portal<\/div>\n        <h4>Provision &amp; Configure<\/h4>\n        <p>Hardware settings, device changes, and serial number linking.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 02 · Mastering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 10 — VIDEO PLACEHOLDER ═══════════════════════════════ -->"}, {"id": "m2-slide-10", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 10, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-10\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Demonstration<\/div>\n      <h2><em>Remote Login<\/em> Walkthrough<\/h2>\n    <\/div>\n    <div class=\"video-placeholder\">\n      <div class=\"play-btn\">▶<\/div>\n      <p>Add video that shows remotely logging in<\/p>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 02 · Mastering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 11 — RESIDENT APP REGISTRATION ═══════════════════════════════ -->"}, {"id": "m2-slide-11", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 11, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-11\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col blue-panel\">\n    <div class=\"panel-visual\">\n      <span class=\"big-icon\">📲<\/span>\n      <div class=\"panel-heading\">Resident App<br><em>Registration<\/em><\/div>\n      <div>\n        <span class=\"panel-tag\">📱 iOS<\/span>\n        <span class=\"panel-tag\">🤖 Android<\/span>\n        <span class=\"panel-tag\">🔒 SMS Verified<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"eyebrow\">Resident App<\/div>\n    <h2>Resident App:<br><em>Registration &amp; Login<\/em><\/h2>\n    <p class=\"sub-label\">Connecting the End-User<\/p>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">👤<\/div>\n      <div>\n        <strong>Property Manager Onboarding<\/strong>\n        <p>A user must first be added to the system by the property manager before they can log in.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">🔒<\/div>\n      <div>\n        <strong>Permission Protocol<\/strong>\n        <p>Users must accept all permissions (Location, Camera, Microphone) for the app to function correctly.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"feature-point\">\n      <div class=\"feature-icon\">💬<\/div>\n      <div>\n        <strong>SMS Verification<\/strong>\n        <p>Users register using their phone number and email to receive a one-time verification code via SMS.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 02 · Mastering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 12 — RESIDENT APP CORE FUNCTIONALITY ═══════════════════════════════ -->"}, {"id": "m2-slide-12", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 12, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-12\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"slide-inner\">\n    <div class=\"slide-header\">\n      <div class=\"eyebrow\">Resident App<\/div>\n      <h2>Resident App: <em>Core Functionality<\/em><\/h2>\n    <\/div>\n    <div class=\"two-col-features\">\n      <div class=\"feature-group-card card-base\">\n        <h3>📺 The Daily User Experience<\/h3>\n        <ul>\n          <li><strong>Video &amp; Audio Calls:<\/strong> Residents receive live HD video calls from the entry panel directly to their smartphones.<\/li>\n          <li><strong>Remote Unlock:<\/strong> Users can unlock the door or gate from anywhere with an internet connection.<\/li>\n          <li><strong>Keypad Backup:<\/strong> If a resident chooses not to use the app, they can still receive standard phone calls and grant access by pressing *9 on their keypad.<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"feature-group-card card-base\">\n        <h3>🔐 Enhanced Access Control<\/h3>\n        <ul>\n          <li><strong>Call Groups:<\/strong> Allows multiple devices (e.g., spouses or roommates) to ring simultaneously when a call is received from the entry panel.<\/li>\n          <li><strong>Guest PINs:<\/strong> Residents can create temporary, limited-use PINs for visitors or deliveries with specific expiration dates.<\/li>\n          <li><strong>Do Not Disturb (DND):<\/strong> Residents can silence calls temporarily through the Profile tab.<\/li>\n        <\/ul>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 02 · Mastering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 13 — RESIDENT APP FEATURES ═══════════════════════════════ -->"}, {"id": "m2-slide-13", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 13, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-13\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-col blue-panel\">\n    <div class=\"panel-visual\">\n      <span class=\"big-icon\">📱<\/span>\n      <div class=\"panel-heading\"><em>Intuitive<\/em><br>iOS and Android Apps<\/div>\n      <div>\n        <span class=\"panel-tag\">Resident App<\/span>\n        <span class=\"panel-tag\">Self-Service<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n  <div class=\"right-col\">\n    <div class=\"eyebrow\">Resident App<\/div>\n    <h2><em>Intuitive<\/em> iOS and<br>Android Apps<\/h2>\n    <p class=\"sub-label\">From the app the user can:<\/p>\n    <div class=\"checklist\">\n      <div class=\"check-item\"><div class=\"check-dot\">✓<\/div><span>Swipe to unlock (open) a door<\/span><\/div>\n      <div class=\"check-item\"><div class=\"check-dot\">✓<\/div><span>Create and edit calling groups<\/span><\/div>\n      <div class=\"check-item\"><div class=\"check-dot\">✓<\/div><span>Send guest PINs<\/span><\/div>\n      <div class=\"check-item\"><div class=\"check-dot\">✓<\/div><span>Edit their PIN<\/span><\/div>\n      <div class=\"check-item\"><div class=\"check-dot\">✓<\/div><span>Hide from directory<\/span><\/div>\n      <div class=\"check-item\"><div class=\"check-dot\">✓<\/div><span>Activate Do Not Disturb<\/span><\/div>\n    <\/div>\n  <\/div>\n  <div class=\"bottom-bar\">\n    <span>MyDoorView · MCTS Certification Program<\/span>\n    <span>Module 02 · Mastering Apps &amp; Interfaces<\/span>\n  <\/div>\n<\/div>\n\n<!-- ═══════════════════════════════ SLIDE 14 — SUMMARY ═══════════════════════════════ -->"}, {"id": "m2-slide-14", "modNum": 2, "modTitle": "Apps & Interfaces", "modEmoji": "🖥️", "slideNum": 14, "total": 14, "html": "<div class=\"slide\" id=\"m2-slide-14\">\n  <div class=\"accent-bar\"><\/div>\n  <div class=\"left-panel\">\n    <div style=\"position:relative;z-index:2;text-align:center;\">\n      <div class=\"module-label\">Module 02 Complete<\/div>\n      <h2>Module<br><em>Summary<\/em><\/h2>\n    <\/div>\n  <\/div>\n  <div class=\"right-panel\">\n    <div class=\"section-label\">Key Takeaways<\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">01<\/div><div class=\"takeaway-text\"><strong>Dealer Portal<\/strong><p>Use to create client accounts and download sales and technical documents.<\/p><\/div><\/div>\n    <div class=\"takeaway-item\"><div class=\"takeaway-num\">02<\/div><div class=\"takeaway-text\"><strong>Remote Login<\/st
